<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NEXUS | Социальная платформа</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            transform: translateY(-4px);
            border-color: rgba(139, 92, 246, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        .btn-primary {
            background: linear-gradient(135deg, #8b5cf6, #ec489a);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary:hover { transform: scale(1.05); box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.5); }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }
        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .input-glow {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 14px 18px;
            color: white;
            width: 100%;
        }
        .input-glow:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(139, 92, 246, 0.5);
            border-radius: 16px;
            padding: 14px 24px;
            z-index: 1100;
        }
        .avatar-wrapper {
            background: linear-gradient(135deg, #8b5cf6, #ec489a);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .verified-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            margin-left: 6px;
        }
        .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: linear-gradient(135deg, #ef4444, #ec489a);
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 10px;
            margin-left: 8px;
        }
        .nav-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 28px;
            border-radius: 40px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.7);
        }
        .nav-btn.active {
            background: linear-gradient(135deg, #8b5cf6, #ec489a);
            color: white;
        }
        .like-btn { transition: all 0.2s; cursor: pointer; }
        .like-btn.liked { color: #ec489a; animation: heartBeat 0.4s ease; }
        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
        .settings-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-out;
        }
        .settings-panel.open { max-height: 2000px; }
        .tab-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #8b5cf6, #ec489a);
            color: white;
        }
        .post-image {
            max-width: 100%;
            max-height: 400px;
            border-radius: 16px;
            margin-top: 12px;
        }
        .image-preview {
            margin-top: 12px;
            position: relative;
            display: inline-block;
        }
        .image-preview img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 16px;
        }
        .image-preview .remove-image {
            position: absolute;
            top: -8px;
            right: -8px;
            background: rgba(0,0,0,0.7);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
        }
    </style>
    <!-- Supabase -->
    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
            }
        }
    </script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js'
        
        const supabaseUrl = 'https://wftbevggdyaufaelkbyw.supabase.co'
        const supabaseAnonKey = 'sb_publishable_Rr-nBqv8yF_lX3V7Syu-Vw_ZeiNi6QQ'
        
        window.supabase = createClient(supabaseUrl, supabaseAnonKey)
        
        window.saveAllToSupabase = async function(state) {
            try {
                for (const user of state.users) await window.supabase.from('users').upsert(user, { onConflict: 'id' })
                for (const post of state.posts) await window.supabase.from('posts').upsert(post, { onConflict: 'id' })
                for (const comment of state.comments) await window.supabase.from('comments').upsert(comment, { onConflict: 'id' })
                for (const like of state.likes) await window.supabase.from('likes').upsert(like, { onConflict: 'id' })
                for (const friend of state.friends) await window.supabase.from('friends').upsert(friend, { onConflict: 'id' })
                for (const notif of state.notifications) await window.supabase.from('notifications').upsert(notif, { onConflict: 'id' })
                for (const req of state.verificationRequests) await window.supabase.from('verification_requests').upsert(req, { onConflict: 'id' })
                for (const ban of state.bannedUsers) await window.supabase.from('banned_users').upsert(ban, { onConflict: 'id' })
                console.log('✅ Данные сохранены в Supabase')
            } catch (error) { console.error('Ошибка сохранения:', error) }
        }
        
        window.loadAllFromSupabase = async function() {
            try {
                const [
                    { data: users }, { data: posts }, { data: comments }, { data: likes },
                    { data: friends }, { data: notifications }, { data: verificationRequests }, { data: bannedUsers }
                ] = await Promise.all([
                    window.supabase.from('users').select('*'),
                    window.supabase.from('posts').select('*'),
                    window.supabase.from('comments').select('*'),
                    window.supabase.from('likes').select('*'),
                    window.supabase.from('friends').select('*'),
                    window.supabase.from('notifications').select('*'),
                    window.supabase.from('verification_requests').select('*'),
                    window.supabase.from('banned_users').select('*')
                ])
                return { users: users || [], posts: posts || [], comments: comments || [], likes: likes || [],
                         friends: friends || [], notifications: notifications || [],
                         verificationRequests: verificationRequests || [], bannedUsers: bannedUsers || [] }
            } catch (error) { console.error('Ошибка загрузки:', error); return null }
        }
    </script>
</head>
<body>
    <div id="app"></div>
    <script>
        // ========== СОСТОЯНИЕ ==========
        let state = {
            currentUser: null,
            users: [],
            posts: [],
            comments: [],
            likes: [],
            friends: [],
            reposts: [],
            notifications: [],
            verificationRequests: [],
            bannedUsers: [],
            systemSettings: { theme: 'dark', notifications: true, language: 'ru', privacy: 'public' },
            adminId: null
        };

        let unreadCount = 0;
        let repostModalPostId = null;
        let currentView = { type: 'feed', userId: null };
        let settingsOpen = false;
        let settingsTab = 'profile';
        let currentPostImage = null;

        const avatarPresets = [
            'https://api.dicebear.com/7.x/avataaars/svg?seed=Avatar1&backgroundColor=8b5cf6',
            'https://api.dicebear.com/7.x/avataaars/svg?seed=Avatar2&backgroundColor=ec489a'
        ];
        const coverPresets = [
            'https://images.unsplash.com/photo-1579546929518-9e396f3cc809?w=800',
            'https://images.unsplash.com/photo-1533174072545-7a4b6ad7a6c3?w=800'
        ];

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}" style="margin-right:8px"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : m === '>' ? '&gt;' : m);
        }

        function saveData() {
            localStorage.setItem('nexus_data', JSON.stringify({
                users: state.users, posts: state.posts, comments: state.comments, likes: state.likes,
                friends: state.friends, reposts: state.reposts, notifications: state.notifications,
                verificationRequests: state.verificationRequests, bannedUsers: state.bannedUsers,
                systemSettings: state.systemSettings, currentUser: state.currentUser, adminId: state.adminId
            }));
            if (window.saveAllToSupabase) window.saveAllToSupabase(state);
        }

        async function loadData() {
            const saved = localStorage.getItem('nexus_data');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    state.users = data.users || [];
                    state.posts = data.posts || [];
                    state.comments = data.comments || [];
                    state.likes = data.likes || [];
                    state.friends = data.friends || [];
                    state.reposts = data.reposts || [];
                    state.notifications = data.notifications || [];
                    state.verificationRequests = data.verificationRequests || [];
                    state.bannedUsers = data.bannedUsers || [];
                    state.systemSettings = data.systemSettings || { theme: 'dark', notifications: true, language: 'ru', privacy: 'public' };
                    state.currentUser = data.currentUser || null;
                    state.adminId = data.adminId || null;
                    unreadCount = state.notifications.filter(n => !n.read && n.userId === state.currentUser?.id).length;
                } catch(e) {}
            }
            if (window.loadAllFromSupabase) {
                try {
                    const supabaseData = await window.loadAllFromSupabase();
                    if (supabaseData) {
                        if (supabaseData.users.length) state.users = supabaseData.users;
                        if (supabaseData.posts.length) state.posts = supabaseData.posts;
                        if (supabaseData.comments.length) state.comments = supabaseData.comments;
                        if (supabaseData.likes.length) state.likes = supabaseData.likes;
                        if (supabaseData.friends.length) state.friends = supabaseData.friends;
                        if (supabaseData.notifications.length) state.notifications = supabaseData.notifications;
                        if (supabaseData.verificationRequests.length) state.verificationRequests = supabaseData.verificationRequests;
                        if (supabaseData.bannedUsers.length) state.bannedUsers = supabaseData.bannedUsers;
                    }
                } catch(e) { console.log('Supabase load error:', e); }
            }
        }

        function getUserById(id) { return state.users.find(u => u.id === id); }
        function isAdmin(userId) { return state.adminId === userId; }
        function isBanned(userId) { const ban = state.bannedUsers.find(b => b.userId === userId); if (!ban) return false; if (ban.expiresAt && ban.expiresAt < Date.now()) { state.bannedUsers = state.bannedUsers.filter(b => b.userId !== userId); saveData(); return false; } return true; }
        function addNotification(userId, type, data) { state.notifications.push({ id: 'n' + Date.now(), userId, type, data, read: false, timestamp: Date.now() }); if (userId === state.currentUser?.id && state.systemSettings.notifications) unreadCount++; saveData(); }

        function registerUser(name, username, email, password) {
            if (!name || !username || !email || !password) { showToast('Заполните все поля', 'error'); return false; }
            if (state.users.find(u => u.email === email)) { showToast('Email уже используется', 'error'); return false; }
            if (state.users.find(u => u.username === username)) { showToast('Username уже используется', 'error'); return false; }
            const isFirstUser = state.users.length === 0;
            const newUser = {
                id: 'u' + Date.now(),
                name, username, email, password,
                avatar: avatarPresets[0],
                cover: coverPresets[0],
                bio: '🌟 Новый пользователь NEXUS!',
                city: '',
                createdAt: new Date().toISOString(),
                verified: false
            };
            state.users.push(newUser);
            state.currentUser = newUser;
            if (isFirstUser) { state.adminId = newUser.id; showToast('👑 Вы стали администратором NEXUS!', 'success'); }
            saveData();
            showToast('🎉 Добро пожаловать в NEXUS!', 'success');
            return true;
        }

        function loginUser(email, password) {
            const user = state.users.find(u => u.email === email && u.password === password);
            if (user) {
                if (isBanned(user.id)) { showToast('❌ Вы заблокированы', 'error'); return false; }
                state.currentUser = user;
                unreadCount = state.notifications.filter(n => !n.read && n.userId === user.id).length;
                saveData();
                showToast(`👋 С возвращением, ${user.name}!`, 'success');
                return true;
            }
            showToast('Неверный email или пароль', 'error');
            return false;
        }

        function logout() { state.currentUser = null; saveData(); render(); }

        function getAllPosts() { return [...state.posts].sort((a, b) => b.timestamp - a.timestamp); }
        function getPostsByUser(userId) { return state.posts.filter(p => p.userId === userId).sort((a, b) => b.timestamp - a.timestamp); }
        function getCommentsForPost(postId) { return state.comments.filter(c => c.postId === postId).sort((a, b) => a.timestamp - b.timestamp); }
        function getLikesCount(postId) { return state.likes.filter(l => l.postId === postId).length; }
        function isLiked(postId, userId) { return state.likes.some(l => l.postId === postId && l.userId === userId); }
        function getFriends(userId) {
            const friendships = state.friends.filter(f => (f.userId === userId && f.status === 'accepted') || (f.friendId === userId && f.status === 'accepted'));
            return friendships.map(f => getUserById(f.userId === userId ? f.friendId : f.userId)).filter(Boolean);
        }

        function uploadImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        async function createPost(content, image = null, originalPostId = null, repostComment = null) {
            if (!content.trim() && !image && !originalPostId) return false;
            if (isBanned(state.currentUser.id)) { showToast('❌ Вы заблокированы', 'error'); return false; }
            const newPost = {
                id: 'p' + Date.now(),
                userId: state.currentUser.id,
                content: content.trim(),
                image: image,
                timestamp: Date.now(),
                originalPostId: originalPostId,
                repostComment: repostComment
            };
            state.posts.unshift(newPost);
            saveData();
            if (originalPostId) { showToast('📢 Репост опубликован!', 'success'); }
            else if (image) { showToast('📷 Пост с фото опубликован!', 'success'); }
            else { showToast('✨ Пост опубликован!', 'success'); }
            return true;
        }

        function deletePost(postId) {
            const post = state.posts.find(p => p.id === postId);
            if (post && (post.userId === state.currentUser.id || isAdmin(state.currentUser.id))) {
                state.posts = state.posts.filter(p => p.id !== postId);
                state.comments = state.comments.filter(c => c.postId !== postId);
                state.likes = state.likes.filter(l => l.postId !== postId);
                saveData();
                showToast('🗑 Пост удален', 'success');
                return true;
            }
            return false;
        }

        function addComment(postId, text) {
            if (!text.trim()) return false;
            if (isBanned(state.currentUser.id)) { showToast('❌ Вы заблокированы', 'error'); return false; }
            state.comments.push({ id: 'c' + Date.now(), postId, userId: state.currentUser.id, text: text.trim(), timestamp: Date.now() });
            saveData();
            showToast('💬 Комментарий добавлен', 'success');
            return true;
        }

        function toggleLike(postId) {
            const existing = state.likes.find(l => l.postId === postId && l.userId === state.currentUser.id);
            if (existing) state.likes = state.likes.filter(l => l.id !== existing.id);
            else state.likes.push({ id: 'l' + Date.now(), postId, userId: state.currentUser.id, timestamp: Date.now() });
            saveData();
            render();
        }

        function sendFriendRequest(userId) {
            if (userId === state.currentUser.id) return;
            if (getFriends(state.currentUser.id).some(f => f.id === userId)) { showToast('Уже друзья', 'info'); return; }
            if (state.friends.some(f => (f.userId === state.currentUser.id && f.friendId === userId) || (f.userId === userId && f.friendId === state.currentUser.id))) {
                showToast('Заявка уже отправлена', 'info'); return;
            }
            state.friends.push({ id: 'f' + Date.now(), userId: state.currentUser.id, friendId: userId, status: 'pending' });
            addNotification(userId, 'friend_request', { userName: state.currentUser.name });
            saveData();
            showToast('📨 Заявка отправлена!', 'success');
        }

        function acceptFriendRequest(requestId) {
            const request = state.friends.find(f => f.id === requestId);
            if (request) { request.status = 'accepted'; saveData(); showToast('🎉 Теперь вы друзья!', 'success'); render(); }
        }

        function updateProfile(updates) { Object.assign(state.currentUser, updates); const index = state.users.findIndex(u => u.id === state.currentUser.id); if (index !== -1) state.users[index] = state.currentUser; saveData(); showToast('✅ Профиль обновлен!', 'success'); render(); }

        function navigateToFeed() { currentView = { type: 'feed' }; settingsOpen = false; render(); }
        function navigateToProfile(userId) { currentView = { type: 'profile', userId }; settingsOpen = false; render(); }
        function navigateToFriends() { currentView = { type: 'friends' }; settingsOpen = false; render(); }
        function navigateToAdmin() { currentView = { type: 'admin' }; settingsOpen = false; render(); }

        function render() { if (!state.currentUser) renderAuth(); else renderMain(); }

        function renderAuth() {
            const app = document.getElementById('app');
            let isLogin = true;
            function refresh() {
                app.innerHTML = `
                    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px">
                        <div class="glass" style="max-width:480px;width:100%;padding:48px">
                            <div style="text-align:center;margin-bottom:40px">
                                <img src="logo.png" style="height:48px;width:auto;border-radius:12px;margin-bottom:16px">
                                <h1 style="font-size:42px;font-weight:800;background:linear-gradient(135deg,#8b5cf6,#ec489a);-webkit-background-clip:text;-webkit-text-fill-color:transparent">NEXUS</h1>
                                <p style="color:rgba(255,255,255,0.7)">Социальная платформа</p>
                                <p style="color:#8b5cf6;font-size:12px">👑 Первый пользователь = Администратор</p>
                            </div>
                            <div style="display:flex;gap:12px;margin-bottom:32px">
                                <button id="loginTab" style="flex:1;padding:12px;border:none;border-radius:40px;font-weight:600;cursor:pointer;background:${isLogin ? 'linear-gradient(135deg,#8b5cf6,#ec489a)' : 'rgba(255,255,255,0.1)'};color:white">Вход</button>
                                <button id="registerTab" style="flex:1;padding:12px;border:none;border-radius:40px;font-weight:600;cursor:pointer;background:${!isLogin ? 'linear-gradient(135deg,#8b5cf6,#ec489a)' : 'rgba(255,255,255,0.1)'};color:white">Регистрация</button>
                            </div>
                            <div id="authForm">
                                ${isLogin ? `
                                    <input type="email" id="loginEmail" placeholder="Email" class="input-glow" style="margin-bottom:16px">
                                    <input type="password" id="loginPassword" placeholder="Пароль" class="input-glow" style="margin-bottom:24px">
                                    <button id="loginBtn" class="btn-primary" style="width:100%">Войти</button>
                                ` : `
                                    <input type="text" id="regName" placeholder="Полное имя" class="input-glow" style="margin-bottom:12px">
                                    <input type="text" id="regUsername" placeholder="Имя пользователя" class="input-glow" style="margin-bottom:12px">
                                    <input type="email" id="regEmail" placeholder="Email" class="input-glow" style="margin-bottom:12px">
                                    <input type="password" id="regPassword" placeholder="Пароль" class="input-glow" style="margin-bottom:24px">
                                    <button id="registerBtn" class="btn-primary" style="width:100%">Зарегистрироваться</button>
                                `}
                            </div>
                        </div>
                    </div>
                `;
                document.getElementById('loginTab')?.addEventListener('click', () => { isLogin = true; refresh(); });
                document.getElementById('registerTab')?.addEventListener('click', () => { isLogin = false; refresh(); });
                if (isLogin) {
                    document.getElementById('loginBtn')?.addEventListener('click', () => {
                        const email = document.getElementById('loginEmail').value;
                        const password = document.getElementById('loginPassword').value;
                        if (loginUser(email, password)) render();
                    });
                } else {
                    document.getElementById('registerBtn')?.addEventListener('click', () => {
                        const name = document.getElementById('regName').value;
                        const username = document.getElementById('regUsername').value;
                        const email = document.getElementById('regEmail').value;
                        const password = document.getElementById('regPassword').value;
                        if (registerUser(name, username, email, password)) render();
                    });
                }
            }
            refresh();
        }

        function renderMain() {
            const app = document.getElementById('app');
            const user = state.currentUser;
            const isAdminUser = isAdmin(user.id);
            const allPosts = getAllPosts();
            const friends = getFriends(user.id);
            const pendingRequests = state.friends.filter(f => f.friendId === user.id && f.status === 'pending');
            const pendingVerifications = state.verificationRequests.filter(r => r.status === 'pending');

            let content = '';
            if (currentView.type === 'feed') {
                content = `
                    <div style="max-width:680px;margin:0 auto">
                        <div class="glass-card" style="padding:24px;margin-bottom:24px">
                            <div style="display:flex;gap:16px;align-items:flex-start">
                                <div class="avatar-wrapper" style="width:52px;height:52px"><img src="${user.avatar}" class="avatar-img"></div>
                                <div style="flex:1">
                                    <textarea id="postContent" rows="2" placeholder="Что нового? (можно вставлять эмодзи 😊✨)" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:14px;color:white;resize:none;font-family:inherit"></textarea>
                                    <div id="imagePreview" class="image-preview" style="display:none;margin-top:12px"></div>
                                    <div style="display:flex;justify-content:flex-end;gap:12px;margin-top:12px">
                                        <label class="btn-secondary" style="padding:10px 20px;cursor:pointer"><i class="fas fa-image"></i> Фото<input type="file" id="postImageInput" accept="image/*" style="display:none"></label>
                                        <button id="publishBtn" class="btn-primary">Опубликовать ✨</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        ${allPosts.map(post => {
                            const author = getUserById(post.userId);
                            if (!author) return '';
                            const comments = getCommentsForPost(post.id);
                            const likesCount = getLikesCount(post.id);
                            const liked = isLiked(post.id, user.id);
                            return `
                                <div class="glass-card" style="padding:24px;margin-bottom:20px" id="post-${post.id}">
                                    <div style="display:flex;justify-content:space-between">
                                        <div style="display:flex;gap:12px;cursor:pointer" onclick="window.navigateToProfileExternal('${author.id}')">
                                            <div class="avatar-wrapper" style="width:48px;height:48px"><img src="${author.avatar}" class="avatar-img"></div>
                                            <div><div style="font-weight:600">${escapeHtml(author.name)}${author.verified ? '<span class="verified-badge">✅</span>' : ''}${isAdmin(author.id) ? '<span class="admin-badge">👑</span>' : ''}</div><div style="font-size:12px;color:rgba(255,255,255,0.5)">${new Date(post.timestamp).toLocaleString()}</div></div>
                                        </div>
                                        ${(author.id === user.id || isAdminUser) ? `<button onclick="window.deletePostExternal('${post.id}')" style="background:none;border:none;color:rgba(255,255,255,0.5)"><i class="fas fa-trash"></i></button>` : ''}
                                    </div>
                                    <div style="margin:16px 0"><p style="white-space:pre-wrap">${escapeHtml(post.content)}</p>${post.image ? `<img src="${post.image}" class="post-image">` : ''}</div>
                                    <div style="display:flex;gap:20px;padding:12px 0;border-top:1px solid rgba(255,255,255,0.1);border-bottom:1px solid rgba(255,255,255,0.1)">
                                        <button class="like-btn ${liked ? 'liked' : ''}" data-post="${post.id}" style="background:none;border:none;cursor:pointer;color:${liked ? '#ec489a' : 'rgba(255,255,255,0.6)'}"><i class="fas fa-heart"></i> ${likesCount}</button>
                                        <button onclick="window.toggleCommentsExternal('${post.id}')" style="background:none;border:none;cursor:pointer"><i class="fas fa-comment"></i> ${comments.length}</button>
                                        <button onclick="window.sendFriendExternal('${author.id}')" style="background:none;border:none;cursor:pointer"><i class="fas fa-user-plus"></i></button>
                                    </div>
                                    <div id="comments-${post.id}" style="margin-top:16px">
                                        ${comments.map(c => { const cu = getUserById(c.userId); return `<div style="display:flex;gap:10px;margin-bottom:12px"><div class="avatar-wrapper" style="width:32px;height:32px" onclick="window.navigateToProfileExternal('${cu.id}')"><img src="${cu.avatar}" class="avatar-img"></div><div style="flex:1;background:rgba(255,255,255,0.05);border-radius:18px;padding:8px 14px"><span style="font-weight:600;cursor:pointer" onclick="window.navigateToProfileExternal('${cu.id}')">${escapeHtml(cu.name)}</span> <span>${escapeHtml(c.text)}</span></div></div>`; }).join('')}
                                        <div style="display:flex;gap:10px;margin-top:12px">
                                            <div class="avatar-wrapper" style="width:32px;height:32px"><img src="${user.avatar}" class="avatar-img"></div>
                                            <div style="flex:1;display:flex;gap:8px"><input type="text" id="commentInput-${post.id}" placeholder="Написать комментарий..." style="flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:10px 16px;color:white"><button onclick="window.addCommentExternal('${post.id}', document.getElementById('commentInput-${post.id}').value)" style="background:linear-gradient(135deg,#8b5cf6,#ec489a);border:none;border-radius:50%;width:40px;height:40px;cursor:pointer"><i class="fas fa-arrow-right"></i></button></div>
                                        </div>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                        ${allPosts.length === 0 ? '<div style="text-align:center;padding:60px">✨ Нет постов. Будьте первым!</div>' : ''}
                    </div>
                `;
            } else if (currentView.type === 'profile') {
                const profileUser = getUserById(currentView.userId) || user;
                const isOwn = profileUser.id === user.id;
                const userPosts = getPostsByUser(profileUser.id);
                content = `
                    <div style="max-width:880px;margin:0 auto">
                        <div class="glass-card" style="overflow:hidden;margin-bottom:24px">
                            <img src="${profileUser.cover}" style="width:100%;height:200px;object-fit:cover">
                            <div style="padding:24px;margin-top:-50px">
                                <div style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap">
                                    <div style="display:flex;gap:20px;align-items:flex-end">
                                        <div class="avatar-wrapper" style="width:100px;height:100px"><img src="${profileUser.avatar}" class="avatar-img"></div>
                                        <div><h1 style="font-size:32px">${escapeHtml(profileUser.name)}${profileUser.verified ? ' ✅' : ''}${isAdmin(profileUser.id) ? ' 👑' : ''}</h1><p style="color:rgba(255,255,255,0.6)">@${profileUser.username}</p><p>${escapeHtml(profileUser.bio)}</p></div>
                                    </div>
                                    ${!isOwn ? `<button id="addFriendBtn" class="btn-secondary">${getFriends(user.id).some(f=>f.id===profileUser.id) ? '✓ В друзьях' : '➕ Добавить'}</button>` : `<button id="editProfileBtn" class="btn-secondary"><i class="fas fa-edit"></i> Редактировать</button>`}
                                </div>
                            </div>
                        </div>
                        <h2>📝 Посты (${userPosts.length})</h2>
                        ${userPosts.map(post => `
                            <div class="glass-card" style="padding:24px;margin-bottom:20px">
                                <p>${escapeHtml(post.content)}</p>${post.image ? `<img src="${post.image}" class="post-image">` : ''}
                                <div style="display:flex;gap:20px;margin-top:12px">
                                    <button class="like-btn ${isLiked(post.id, user.id) ? 'liked' : ''}" data-post="${post.id}" style="background:none;border:none;cursor:pointer"><i class="fas fa-heart"></i> ${getLikesCount(post.id)}</button>
                                    <span><i class="fas fa-comment"></i> ${getCommentsForPost(post.id).length}</span>
                                    ${isOwn || isAdminUser ? `<button onclick="window.deletePostExternal('${post.id}')" style="background:none;border:none"><i class="fas fa-trash"></i></button>` : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            } else if (currentView.type === 'friends') {
                content = `
                    <div style="max-width:680px;margin:0 auto">
                        ${pendingRequests.length > 0 ? `<div class="glass-card" style="padding:24px;margin-bottom:24px"><h3>📨 Заявки в друзья</h3>${pendingRequests.map(req => { const reqUser = getUserById(req.userId); return `<div style="display:flex;justify-content:space-between;align-items:center;padding:12px"><div><strong>${escapeHtml(reqUser.name)}</strong> @${reqUser.username}</div><button onclick="window.acceptFriendExternal('${req.id}')" class="btn-primary" style="padding:6px 16px">Принять</button></div>`; }).join('')}</div>` : ''}
                        <div class="glass-card" style="padding:24px"><h3>👥 Друзья (${friends.length})</h3>${friends.map(f => `<div style="display:flex;align-items:center;gap:12px;padding:12px;cursor:pointer" onclick="window.navigateToProfileExternal('${f.id}')"><div class="avatar-wrapper" style="width:40px;height:40px"><img src="${f.avatar}" class="avatar-img"></div><div><strong>${escapeHtml(f.name)}</strong><br><span style="font-size:12px">@${f.username}</span></div></div>`).join('')}</div>
                    </div>
                `;
            } else if (currentView.type === 'admin' && isAdminUser) {
                content = `
                    <div style="max-width:800px;margin:0 auto">
                        <div class="glass-card" style="padding:24px">
                            <h2>👑 Админ-панель</h2>
                            <div style="margin:24px 0"><h3>✅ Заявки на верификацию (${pendingVerifications.length})</h3>${pendingVerifications.map(r => `<div><div><strong>${escapeHtml(r.userName)}</strong><br><small>${new Date(r.timestamp).toLocaleString()}</small></div><p>${escapeHtml(r.reason)}</p><div style="display:flex;gap:12px"><button onclick="window.approveVerificationExternal('${r.id}')" class="btn-primary">✅ Одобрить</button><button onclick="window.rejectVerificationExternal('${r.id}')" class="btn-secondary">❌ Отклонить</button></div></div>`).join('')}</div>
                            <div><h3>👥 Пользователи</h3>${state.users.map(u => `<div style="display:flex;justify-content:space-between;align-items:center"><div><strong>${escapeHtml(u.name)}</strong> @${u.username}${u.verified ? ' ✅' : ''}${u.id === state.adminId ? ' 👑' : ''}</div><button onclick="window.banUserExternal('${u.id}')" class="btn-danger" style="padding:6px 12px">🔨 Бан</button></div>`).join('')}</div>
                        </div>
                    </div>
                `;
            }

            app.innerHTML = `
                <div style="min-height:100vh">
                    <div style="position:sticky;top:0;z-index:100;background:rgba(15,12,41,0.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.1)">
                        <div style="max-width:1200px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px">
                            <div style="display:flex;align-items:center;gap:12px;cursor:pointer" onclick="window.navigateToFeedExternal()">
                                <img src="logo.png" style="height:32px;width:auto;border-radius:8px">
                                <span style="font-size:24px;font-weight:800;background:linear-gradient(135deg,#8b5cf6,#ec489a);-webkit-background-clip:text;-webkit-text-fill-color:transparent">NEXUS</span>
                            </div>
                            <div style="display:flex;gap:12px">
                                <button id="navFeed" class="nav-btn ${currentView.type === 'feed' ? 'active' : ''}"><i class="fas fa-newspaper"></i> Лента</button>
                                <button id="navFriends" class="nav-btn ${currentView.type === 'friends' ? 'active' : ''}"><i class="fas fa-users"></i> Друзья</button>
                                <button id="navProfile" class="nav-btn ${currentView.type === 'profile' && currentView.userId === user.id ? 'active' : ''}"><i class="fas fa-user"></i> Профиль</button>
                                ${isAdminUser ? `<button id="navAdmin" class="nav-btn ${currentView.type === 'admin' ? 'active' : ''}"><i class="fas fa-crown"></i> Админка</button>` : ''}
                            </div>
                            <div style="display:flex;align-items:center;gap:16px">
                                <div class="avatar-wrapper" style="width:44px;height:44px;cursor:pointer" onclick="window.navigateToProfileExternal('${user.id}')"><img src="${user.avatar}" class="avatar-img"></div>
                                <button id="logoutBtn" class="btn-secondary"><i class="fas fa-sign-out-alt"></i> Выйти</button>
                            </div>
                        </div>
                    </div>
                    <div style="max-width:1200px;margin:0 auto;padding:32px 24px">${content}</div>
                </div>
            `;

            document.getElementById('navFeed')?.addEventListener('click', () => navigateToFeed());
            document.getElementById('navFriends')?.addEventListener('click', () => navigateToFriends());
            document.getElementById('navProfile')?.addEventListener('click', () => navigateToProfile(user.id));
            document.getElementById('navAdmin')?.addEventListener('click', () => navigateToAdmin());
            document.getElementById('logoutBtn')?.addEventListener('click', () => logout());
            document.getElementById('publishBtn')?.addEventListener('click', async () => {
                const content = document.getElementById('postContent').value;
                if (!content.trim() && !currentPostImage) { showToast('Напишите что-нибудь или добавьте фото', 'error'); return; }
                if (await createPost(content, currentPostImage)) {
                    document.getElementById('postContent').value = '';
                    currentPostImage = null;
                    const preview = document.getElementById('imagePreview');
                    if (preview) { preview.innerHTML = ''; preview.style.display = 'none'; }
                    render();
                }
            });
            const imageInput = document.getElementById('postImageInput');
            if (imageInput) {
                imageInput.addEventListener('change', async (e) => {
                    if (e.target.files && e.target.files[0]) {
                        const imgData = await uploadImage(e.target.files[0]);
                        currentPostImage = imgData;
                        const preview = document.getElementById('imagePreview');
                        preview.innerHTML = `<div><img src="${imgData}"><div class="remove-image" onclick="document.getElementById('imagePreview').innerHTML=''; currentPostImage=null; document.getElementById('imagePreview').style.display='none'">✖</div></div>`;
                        preview.style.display = 'block';
                    }
                });
            }
            document.getElementById('addFriendBtn')?.addEventListener('click', () => sendFriendRequest(currentView.userId));
            document.getElementById('editProfileBtn')?.addEventListener('click', () => { settingsOpen = true; render(); });
        }

        window.navigateToFeedExternal = () => navigateToFeed();
        window.navigateToProfileExternal = (id) => navigateToProfile(id);
        window.deletePostExternal = (id) => { deletePost(id); render(); };
        window.addCommentExternal = (postId, text) => { addComment(postId, text); render(); };
        window.toggleCommentsExternal = (postId) => { const el = document.getElementById(`comments-${postId}`); if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none'; };
        window.sendFriendExternal = (id) => sendFriendRequest(id);
        window.acceptFriendExternal = (id) => acceptFriendRequest(id);
        window.approveVerificationExternal = (id) => { approveVerification(id); render(); };
        window.rejectVerificationExternal = (id) => { rejectVerification(id); render(); };
        window.banUserExternal = (id) => { openBanModal(id); render(); };

        document.addEventListener('click', (e) => {
            const likeBtn = e.target.closest('.like-btn');
            if (likeBtn) { const postId = likeBtn.dataset.post; if (postId) toggleLike(postId); }
        });

        (async () => {
            await loadData();
            render();
        })();
    </script>
</body>
</html>
</html>
</body>
