        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `
                <div style="display: flex; align-items: center; gap: 12px;">
                    <i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}" style="color: ${type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : '#8b5cf6'}; font-size: 20px;"></i>
                    <span>${message}</span>
                </div>
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // ========== ФУНКЦИИ ДЛЯ РАБОТЫ С BACK4APP ==========
        async function saveToBack4App() {
            try {
                const Users = Parse.Object.extend("_User");
                for (const user of state.users) {
                    let obj;
                    try { obj = await new Parse.Query(Users).get(user.id); } catch(e) { obj = new Users(); obj.id = user.id; }
                    obj.set('name', user.name);
                    obj.set('username', user.username);
                    obj.set('email', user.email);
                    obj.set('password', user.password);
                    obj.set('avatar', user.avatar);
                    obj.set('cover', user.cover);
                    obj.set('bio', user.bio);
                    obj.set('city', user.city);
                    obj.set('verified', user.verified || false);
                    obj.set('created_at', user.created_at);
                    await obj.save();
                }

                const Posts = Parse.Object.extend("Post");
                for (const post of state.posts) {
                    let obj;
                    try { obj = await new Parse.Query(Posts).get(post.id); } catch(e) { obj = new Posts(); obj.id = post.id; }
                    obj.set('userId', post.userId);
                    obj.set('content', post.content);
                    obj.set('image', post.image);
                    obj.set('timestamp', post.timestamp);
                    obj.set('originalPostId', post.originalPostId);
                    obj.set('repostComment', post.repostComment);
                    await obj.save();
                }

                const Comments = Parse.Object.extend("Comment");
                for (const comment of state.comments) {
                    let obj;
                    try { obj = await new Parse.Query(Comments).get(comment.id); } catch(e) { obj = new Comments(); obj.id = comment.id; }
                    obj.set('postId', comment.postId);
                    obj.set('userId', comment.userId);
                    obj.set('text', comment.text);
                    obj.set('timestamp', comment.timestamp);
                    await obj.save();
                }

                const Likes = Parse.Object.extend("Like");
                for (const like of state.likes) {
                    let obj;
                    try { obj = await new Parse.Query(Likes).get(like.id); } catch(e) { obj = new Likes(); obj.id = like.id; }
                    obj.set('postId', like.postId);
                    obj.set('userId', like.userId);
                    obj.set('timestamp', like.timestamp);
                    await obj.save();
                }

                const Friends = Parse.Object.extend("Friend");
                for (const friend of state.friends) {
                    let obj;
                    try { obj = await new Parse.Query(Friends).get(friend.id); } catch(e) { obj = new Friends(); obj.id = friend.id; }
                    obj.set('userId', friend.userId);
                    obj.set('friendId', friend.friendId);
                    obj.set('status', friend.status);
                    await obj.save();
                }

                const Notifications = Parse.Object.extend("Notification");
                for (const notif of state.notifications) {
                    let obj;
                    try { obj = await new Parse.Query(Notifications).get(notif.id); } catch(e) { obj = new Notifications(); obj.id = notif.id; }
                    obj.set('userId', notif.userId);
                    obj.set('type', notif.type);
                    obj.set('data', notif.data);
                    obj.set('read', notif.read);
                    obj.set('timestamp', notif.timestamp);
                    await obj.save();
                }

                const VR = Parse.Object.extend("VerificationRequest");
                for (const req of state.verificationRequests) {
                    let obj;
                    try { obj = await new Parse.Query(VR).get(req.id); } catch(e) { obj = new VR(); obj.id = req.id; }
                    obj.set('userId', req.userId);
                    obj.set('userName', req.userName);
                    obj.set('userAvatar', req.userAvatar);
                    obj.set('reason', req.reason);
                    obj.set('status', req.status);
                    obj.set('timestamp', req.timestamp);
                    await obj.save();
                }

                const Banned = Parse.Object.extend("BannedUser");
                for (const ban of state.bannedUsers) {

                    obj.set('userId', ban.userId);

        async function loadFromBack4App() {
            try {
                const Users = Parse.Object.extend("_User");
                const usersResults = await new Parse.Query(Users).find();
                state.users = usersResults.map(u => ({
                    id: u.id,
                    name: u.get('name'),
                    username: u.get('username'),
                    email: u.get('email'),
                    password: u.get('password'),
                    avatar: u.get('avatar'),
                    cover: u.get('cover'),
                    bio: u.get('bio'),
                    city: u.get('city'),
                    verified: u.get('verified'),
                    created_at: u.get('created_at')
                }));

                const Posts = Parse.Object.extend("Post");
                const postsResults = await new Parse.Query(Posts).find();
                state.posts = postsResults.map(p => ({
                    id: p.id,
                    userId: p.get('userId'),
                    content: p.get('content'),
                    image: p.get('image'),
                    timestamp: p.get('timestamp'),
                    originalPostId: p.get('originalPostId'),
                    repostComment: p.get('repostComment')
                }));

                const Comments = Parse.Object.extend("Comment");
                const commentsResults = await new Parse.Query(Comments).find();
                state.comments = commentsResults.map(c => ({
                    id: c.id,
                    postId: c.get('postId'),
                    userId: c.get('userId'),
                    text: c.get('text'),
                    timestamp: c.get('timestamp')
                }));

                const Likes = Parse.Object.extend("Like");
                const likesResults = await new Parse.Query(Likes).find();
                state.likes = likesResults.map(l => ({
                    id: l.id,
                    postId: l.get('postId'),
                    userId: l.get('userId'),
                    timestamp: l.get('timestamp')
                }));

                const Friends = Parse.Object.extend("Friend");
                const friendsResults = await new Parse.Query(Friends).find();
                state.friends = friendsResults.map(f => ({
                    id: f.id,
                    userId: f.get('userId'),
                    friendId: f.get('friendId'),
                    status: f.get('status')
                }));

                const Notifications = Parse.Object.extend("Notification");
                const notifResults = await new Parse.Query(Notifications).find();
                state.notifications = notifResults.map(n => ({
                    id: n.id,
                    userId: n.get('userId'),
                    type: n.get('type'),
                    data: n.get('data'),
                    read: n.get('read'),
                    timestamp: n.get('timestamp')
                }));

                const VR = Parse.Object.extend("VerificationRequest");
                const vrResults = await new Parse.Query(VR).find();
                state.verificationRequests = vrResults.map(v => ({
                    id: v.id,
                    userId: v.get('userId'),
                    userName: v.get('userName'),
                    userAvatar: v.get('userAvatar'),
                    reason: v.get('reason'),
                    status: v.get('status'),
                    timestamp: v.get('timestamp')
                }));

                const Banned = Parse.Object.extend("BannedUser");
                const bannedResults = await new Parse.Query(Banned).find();
                state.bannedUsers = bannedResults.map(b => ({
                    id: b.id,
                    userId: b.get('userId'),
                    reason: b.get('reason'),
                    expiresAt: b.get('expiresAt'),
                    bannedAt: b.get('bannedAt'),
                    bannedBy: b.get('bannedBy')
                }));

                console.log('✅ Данные загружены из Back4App');
                console.log('👥 Пользователей:', state.users.length);
            } catch (error) {
                console.error('Ошибка загрузки из Back4App:', error);
            }
        }

        function addNotification(userId, type, data) {
            const notification = {
                id: 'n' + Date.now(),
                userId: userId,
                type: type,
                data: data,
                read: false,
                timestamp: Date.now()
            };
            state.notifications.push(notification);
            if (userId === state.currentUser?.id && state.systemSettings.notifications) {
                unreadCount++;
                const bell = document.getElementById('bellIcon');
                if (bell) bell.classList.add('bell-ring');
                setTimeout(() => bell?.classList.remove('bell-ring'), 500);
            }
            saveToBack4App();
        }

        function markNotificationsRead() {
            state.notifications.forEach(n => { if (!n.read) n.read = true; });
            unreadCount = 0;
            saveToBack4App();
        }

        function isAdmin(userId) {
            if (!userId) return false;
            const user = getUserById(userId);
            return user && user.email === ADMIN_EMAIL;
        }

        function isBanned(userId) {
            const ban = state.bannedUsers.find(b => b.userId === userId);
            if (!ban) return false;
            if (ban.expiresAt && ban.expiresAt < Date.now()) {
                state.bannedUsers = state.bannedUsers.filter(b => b.userId !== userId);
                saveToBack4App();
                return false;
            }
            return true;
        }

        function getBanInfo(userId) {
            return state.bannedUsers.find(b => b.userId === userId);
        }

        function adminDeletePost(postId) {
            const post = state.posts.find(p => p.id === postId);
            if (post && isAdmin(state.currentUser.id)) {
                const author = getUserById(post.userId);
                state.posts = state.posts.filter(p => p.id !== postId);
                state.comments = state.comments.filter(c => c.postId !== postId);
                state.likes = state.likes.filter(l => l.postId !== postId);
                saveToBack4App();
                showToast(`🗑 Пост пользователя ${author?.name} удален администратором`, 'success');
                if (author && author.id !== state.currentUser.id) {
                    addNotification(author.id, 'post_deleted_by_admin', {
                        postId: postId,
                        adminName: state.currentUser.name,
                        reason: 'Нарушение правил сообщества'
                    });
                }
                render();
                return true;
            }
            return false;
        }

        function openBanUserModal(userId) {
            const user = getUserById(userId);
            if (!user || userId === state.currentUser.id) return;
            
            const existingBan = getBanInfo(userId);

                <div class="modal active" id="banUserModal" onclick="if(event.target === this) closeBanModal()">

                        <h2 style="font-size: 24px; font-weight: 700; margin-bottom: 16px;">${existingBan ? '🔄 Изменить блокировку' : '🔨 Блокировка пользователя'}</h2>
                        <p style="color: rgba(255,255,255,0.6); margin-bottom: 16px;">Пользователь: <strong>${escapeHtml(user.name)}</strong> (@${user.username})</p>
                        
                        ${existingBan ? `
                            <div class="ban-notification" style="margin-bottom: 16px;">
                                <i class="fas fa-info-circle"></i> Пользователь уже заблокирован
                                ${existingBan.expiresAt ? `<br>Срок блокировки до: ${new Date(existingBan.expiresAt).toLocaleString()}` : '<br>⚠️ Бессрочная блокировка'}
                                <br>Причина: ${escapeHtml(existingBan.reason)}
                            </div>
                        ` : ''}
                        
                        <div style="margin-bottom: 16px;">
                            <label style="display: block; margin-bottom: 8px;">Тип блокировки:</label>
                            <select id="banType" class="input-glow" style="margin-bottom: 12px;">
                                <option value="permanent">🔒 Бессрочная блокировка</option>
                                <option value="temporary">⏰ Временная блокировка</option>
                            </select>
                        </div>
                        
                        <div id="banDurationContainer" style="display: none; margin-bottom: 16px;">
                            <label style="display: block; margin-bottom: 8px;">Срок блокировки:</label>
                            <select id="banDuration" class="input-glow">
                                <option value="1">1 день</option>
                                <option value="3">3 дня</option>
                                <option value="7">7 дней</option>
                                <option value="14">14 дней</option>
                                <option value="30">30 дней</option>
                            </select>
                        </div>
                        
                        <div style="margin-bottom: 20px;">
                            <label style="display: block; margin-bottom: 8px;">Причина блокировки:</label>
                            <textarea id="banReason" rows="3" placeholder="Укажите причину блокировки..." class="input-glow">${existingBan?.reason || ''}</textarea>
                        </div>
                        
                        <div style="display: flex; gap: 12px;">
                            ${existingBan ? `
                                <button id="unbanBtn" class="btn-secondary" style="flex: 1;">🔓 Разблокировать</button>
                                <button id="updateBanBtn" class="btn-primary" style="flex: 1;">🔄 Обновить блокировку</button>
                            ` : `
                                <button id="confirmBanBtn" class="btn-danger" style="flex: 1;">🔨 Заблокировать</button>
                            `}

                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            
            const banTypeSelect = document.getElementById('banType');
            const banDurationContainer = document.getElementById('banDurationContainer');
            
            if (banTypeSelect) {
                banTypeSelect.addEventListener('change', (e) => {
                    banDurationContainer.style.display = e.target.value === 'temporary' ? 'block' : 'none';
                });
            }
            
            if (existingBan) {
                document.getElementById('unbanBtn')?.addEventListener('click', () => {
                    unbanUser(userId);
                    closeBanModal();
                });
                document.getElementById('updateBanBtn')?.addEventListener('click', () => {
                    const banType = document.getElementById('banType').value;
                    const durationDays = parseInt(document.getElementById('banDuration')?.value || '7');
                    const reason = document.getElementById('banReason').value;
                    const expiresAt = banType === 'temporary' ? Date.now() + (durationDays * 24 * 60 * 60 * 1000) : null;
                    banUser(userId, reason, expiresAt);
                    closeBanModal();

                document.getElementById('confirmBanBtn')?.addEventListener('click', () => {
                    const banType = document.getElementById('banType').value;
                    const durationDays = parseInt(document.getElementById('banDuration')?.value || '7');
                    const reason = document.getElementById('banReason').value;
                    if (!reason.trim()) {
                        showToast('Укажите причину блокировки', 'error');
                        return;
                    }
                    const expiresAt = banType === 'temporary' ? Date.now() + (durationDays * 24 * 60 * 60 * 1000) : null;
                    banUser(userId, reason, expiresAt);
                    closeBanModal();

            window.closeBanModal = () => {
                document.getElementById('banUserModal')?.remove();

        function banUser(userId, reason, expiresAt) {
            const user = getUserById(userId);
            if (!user) return;
            
            const existingBan = state.bannedUsers.find(b => b.userId === userId);
            if (existingBan) {
                existingBan.reason = reason;
                existingBan.expiresAt = expiresAt;
                existingBan.bannedAt = Date.now();
                existingBan.bannedBy = state.currentUser.id;
            } else {
                state.bannedUsers.push({
                    userId: userId,
                    reason: reason,
                    bannedAt: Date.now(),
                    expiresAt: expiresAt,
                    bannedBy: state.currentUser.id
                });
            }
            
            saveToBack4App();
            
            addNotification(userId, 'user_banned', {
                reason: reason,
                expiresAt: expiresAt,
                adminName: state.currentUser.name
            });
            
            showToast(`🔨 Пользователь ${user.name} заблокирован`, 'success');
            
            if (state.currentUser?.id === userId) {
                showToast('⚠️ Ваш аккаунт был заблокирован!', 'error');
                setTimeout(() => logout(), 2000);
            }
            
            render();
        }
        
        function unbanUser(userId) {
            const user = getUserById(userId);
            state.bannedUsers = state.bannedUsers.filter(b => b.userId !== userId);
            saveToBack4App();
            showToast(`🔓 Пользователь ${user?.name} разблокирован`, 'success');
            
            addNotification(userId, 'user_unbanned', {
                adminName: state.currentUser.name
            });
            
            render();
        }
        
        function showBanNotification(userId) {
            const banInfo = getBanInfo(userId);
            if (!banInfo) return;
            
            const modalHtml = `
                <div class="modal active" id="banNotificationModal" onclick="if(event.target === this) closeBanNotificationModal()">
                    <div class="modal-content" style="background: rgba(20, 20, 40, 0.98); backdrop-filter: blur(20px); border-radius: 24px; max-width: 450px; width: 90%; padding: 24px; text-align: center;">
                        <i class="fas fa-gavel" style="font-size: 48px; color: #ef4444; margin-bottom: 16px;"></i>
                        <h2 style="font-size: 24px; font-weight: 700; margin-bottom: 12px;">Ваш аккаунт заблокирован</h2>
                        <p style="color: rgba(255,255,255,0.7); margin-bottom: 16px;">${escapeHtml(banInfo.reason)}</p>
                        ${banInfo.expiresAt ? 
                            `<p style="color: #f59e0b; margin-bottom: 20px;">⏰ Блокировка действует до: ${new Date(banInfo.expiresAt).toLocaleString()}</p>` : 
                            `<p style="color: #ef4444; margin-bottom: 20px;">⚠️ Бессрочная блокировка</p>`
                        }
                        <button onclick="closeBanNotificationModal()" class="btn-primary" style="width: 100%;">Понятно</button>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            
            window.closeBanNotificationModal = () => {
                document.getElementById('banNotificationModal')?.remove();
                logout();
            };
        }

        async function saveData() {
            localStorage.setItem('nexus_data', JSON.stringify({
                users: state.users,
                posts: state.posts,
                comments: state.comments,
                likes: state.likes,
                friends: state.friends,
                reposts: state.reposts,
                notifications: state.notifications,
                verificationRequests: state.verificationRequests,
                bannedUsers: state.bannedUsers,
                systemSettings: state.systemSettings,
                currentUser: state.currentUser,
                adminId: state.adminId,
                pendingEmailVerifications: state.pendingEmailVerifications
            }));
            await saveToBack4App();
        }

        async function loadData() {
            const saved = localStorage.getItem('nexus_data');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    state.users = data.users || [];
                    state.posts = data.posts || [];
                    state.comments = data.comments || [];
                    state.likes = data.likes || [];
                    state.friends = data.friends || [];
                    state.reposts = data.reposts || [];
                    state.notifications = data.notifications || [];
                    state.verificationRequests = data.verificationRequests || [];
                    state.bannedUsers = data.bannedUsers || [];
                    state.systemSettings = data.systemSettings || { theme: 'dark', notifications: true, language: 'ru', privacy: 'public' };
                    state.currentUser = data.currentUser || null;
                    state.adminId = data.adminId || null;
                    state.pendingEmailVerifications = data.pendingEmailVerifications || {};
                    unreadCount = state.notifications.filter(n => !n.read && n.userId === state.currentUser?.id).length;
                    
                    if (state.currentUser && isBanned(state.currentUser.id)) {
                        showBanNotification(state.currentUser.id);
                    }
                } catch(e) {}
            }
            
            await loadFromBack4App();
        }

        function initDemoData() {
            if (state.users.length > 0) return;
            state.users = [];
            state.posts = [];
            state.comments = [];
            state.likes = [];
            state.friends = [];
            state.bannedUsers = [];
            state.verificationRequests = [];
            state.adminId = null;
            saveToBack4App();
        }

        function getUserById(id) {
            return state.users.find(u => u.id === id);
        }

        function getFriends(userId) {
            const friendships = state.friends.filter(f => 
                (f.userId === userId && f.status === 'accepted') || 
                (f.friendId === userId && f.status === 'accepted')
            );
            return friendships.map(f => {
                const friendId = f.userId === userId ? f.friendId : f.userId;
                return getUserById(friendId);
            }).filter(Boolean);
        }

        function getAllPosts() {
            return [...state.posts].sort((a, b) => b.timestamp - a.timestamp);
        }

        function getPostsByUser(userId) {
            return state.posts.filter(p => p.userId === userId).sort((a, b) => b.timestamp - a.timestamp);
        }

        function getCommentsForPost(postId) {
            return state.comments.filter(c => c.postId === postId).sort((a, b) => a.timestamp - b.timestamp);
        }

        function getLikesCount(postId) {
            return state.likes.filter(l => l.postId === postId).length;
        }

        function isLiked(postId, userId) {
            return state.likes.some(l => l.postId === postId && l.userId === userId);
        }

        function uploadImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        async function createPost(content, image = null, originalPostId = null, repostComment = null) {
            if (!content.trim() && !image && !originalPostId) return false;
            if (isBanned(state.currentUser.id)) {
                showToast('❌ Вы заблокированы и не можете создавать посты', 'error');
                return false;
            }
            const newPost = {
                id: 'p' + Date.now(),
                userId: state.currentUser.id,
                content: content.trim(),
                image: image,
                timestamp: Date.now(),
                originalPostId: originalPostId,
                repostComment: repostComment
            };
            state.posts.unshift(newPost);
            saveData();
            
            if (originalPostId) {
                const originalPost = state.posts.find(p => p.id === originalPostId);
                if (originalPost && originalPost.userId !== state.currentUser.id) {
                    addNotification(originalPost.userId, 'repost', {
                        postId: originalPostId,
                        userName: state.currentUser.name,
                        postContent: originalPost.content.substring(0, 100),
                        comment: repostComment ? repostComment.substring(0, 100) : null
                    });
                }
                showToast('📢 Репост опубликован!', 'success');
            } else if (image) {
                showToast('📷 Пост с фото опубликован!', 'success');
            } else {
                showToast('✨ Пост опубликован!', 'success');
            }
            return true;
        }

        function openRepostModal(postId) {
            if (isBanned(state.currentUser.id)) {
                showToast('❌ Вы заблокированы и не можете делать репосты', 'error');
                return;
            }
            repostModalPostId = postId;
            const modalHtml = `
                <div class="modal active" id="repostModal" onclick="if(event.target === this) closeRepostModal()">
                    <div class="modal-content repost-modal" style="background: rgba(20, 20, 40, 0.98); backdrop-filter: blur(20px); border-radius: 24px; max-width: 500px; width: 90%; padding: 24px;">
                        <h2 style="font-size: 24px; font-weight: 700; margin-bottom: 16px;">📢 Сделать репост</h2>
                        <p style="color: rgba(255,255,255,0.6); margin-bottom: 16px;">Добавьте комментарий (необязательно):</p>
                        <textarea id="repostComment" rows="4" placeholder="Напишите что-нибудь к этому репосту..." style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 14px; color: white; resize: none; font-family: inherit; margin-bottom: 20px;"></textarea>
                        <div style="display: flex; gap: 12px;">
                            <button id="confirmRepostBtn" class="btn-primary" style="flex: 1;">📢 Сделать репост</button>
                            <button onclick="closeRepostModal()" class="btn-secondary" style="flex: 1;">Отмена</button>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            
            document.getElementById('confirmRepostBtn').onclick = () => {
                const comment = document.getElementById('repostComment').value;
                const originalPost = state.posts.find(p => p.id === postId);
                if (originalPost) {
                    const existingRepost = state.posts.find(p => p.originalPostId === postId && p.userId === state.currentUser.id);
                    if (existingRepost) {
                        showToast('Вы уже сделали репост этого поста', 'info');
                        closeRepostModal();
                        return;
                    }
                    createPost('', null, postId, comment.trim() || null);
                }
                closeRepostModal();
                render();
            };
            
            window.closeRepostModal = () => {
                document.getElementById('repostModal')?.remove();
                repostModalPostId = null;
            };
        }

        function goToOriginalPost(originalPostId) {
            const originalPost = state.posts.find(p => p.id === originalPostId);
            if (originalPost) {
                const postElement = document.getElementById(`post-${originalPostId}`);
                if (postElement) {
                    postElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    postElement.style.transform = 'scale(1.02)';
                    postElement.style.border = '2px solid #8b5cf6';
                    setTimeout(() => {
                        postElement.style.transform = '';
                        postElement.style.border = '';
                    }, 2000);
                } else {
                    navigateToProfile(originalPost.userId);
                    setTimeout(() => {
                        showToast('Пост найден в профиле пользователя', 'info');
                    }, 500);
                }
            }
        }

        function deletePost(postId) {
            const post = state.posts.find(p => p.id === postId);
            if (post && (post.userId === state.currentUser.id || isAdmin(state.currentUser.id))) {
                state.posts = state.posts.filter(p => p.id !== postId);
                state.comments = state.comments.filter(c => c.postId !== postId);
                state.likes = state.likes.filter(l => l.postId !== postId);
                saveData();
                showToast('🗑 Пост удален', 'success');
                return true;
            }
            return false;
        }

        function addComment(postId, text) {
            if (!text.trim()) return false;
            if (isBanned(state.currentUser.id)) {
                showToast('❌ Вы заблокированы и не можете оставлять комментарии', 'error');
                return false;
            }
            const newComment = {
                id: 'c' + Date.now(),
                postId: postId,
                userId: state.currentUser.id,
                text: text.trim(),
                timestamp: Date.now()
            };
            state.comments.push(newComment);
            
            const post = state.posts.find(p => p.id === postId);
            if (post && post.userId !== state.currentUser.id) {
                addNotification(post.userId, 'comment', {
                    postId: postId,
                    userName: state.currentUser.name,
                    commentText: text.substring(0, 100),
                    postContent: post.content.substring(0, 100)
                });
            }
            
            saveData();
            showToast('💬 Комментарий добавлен', 'success');
            return true;
        }

        function toggleLike(postId) {
            const existing = state.likes.find(l => l.postId === postId && l.userId === state.currentUser.id);
            const post = state.posts.find(p => p.id === postId);
            
            if (existing) {
                state.likes = state.likes.filter(l => l.id !== existing.id);
            } else {
                if (isBanned(state.currentUser.id)) {
                    showToast('❌ Вы заблокированы и не можете ставить лайки', 'error');
                    return false;
                }
                state.likes.push({
                    id: 'l' + Date.now(),
                    postId: postId,
                    userId: state.currentUser.id,
                    timestamp: Date.now()
                });
                if (post && post.userId !== state.currentUser.id) {
                    addNotification(post.userId, 'like', {
                        postId: postId,
                        userName: state.currentUser.name,
                        postContent: post.content.substring(0, 100)
                    });
                }
                showToast('❤️ Лайк добавлен!', 'success');
            }
            saveData();
            return !existing;
        }

        function sendFriendRequest(userId) {
            if (userId === state.currentUser.id) return;
            if (isBanned(state.currentUser.id)) {
                showToast('❌ Вы заблокированы и не можете отправлять заявки', 'error');
                return;
            }
            if (getFriends(state.currentUser.id).some(f => f.id === userId)) {
                showToast('Вы уже друзья', 'info');
                return;
            }
            const existing = state.friends.find(f => 
                (f.userId === state.currentUser.id && f.friendId === userId) ||
                (f.userId === userId && f.friendId === state.currentUser.id)
            );
            if (existing) {
                showToast('Заявка уже отправлена', 'info');
                return;
            }
            state.friends.push({
                id: 'f' + Date.now(),
                userId: state.currentUser.id,
                friendId: userId,
                status: 'pending'
            });
            
            addNotification(userId, 'friend_request', {
                userId: state.currentUser.id,
                userName: state.currentUser.name
            });
            
            saveData();
            showToast('📨 Заявка отправлена!', 'success');
        }

        function acceptFriendRequest(requestId) {
            const request = state.friends.find(f => f.id === requestId);
            if (request) {
                request.status = 'accepted';
                addNotification(request.userId, 'friend_accept', {
                    userName: state.currentUser.name
                });
                saveData();
                showToast('🎉 Теперь вы друзья!', 'success');
            }
        }

        function updateProfile(updates) {
            if (isBanned(state.currentUser.id)) {
                showToast('❌ Вы заблокированы и не можете редактировать профиль', 'error');
                return;
            }
            Object.assign(state.currentUser, updates);
            const index = state.users.findIndex(u => u.id === state.currentUser.id);
            if (index !== -1) state.users[index] = state.currentUser;
            saveData();
            showToast('✅ Профиль обновлен!', 'success');
        }

        function updateSystemSettings(updates) {
            Object.assign(state.systemSettings, updates);
            saveData();
            showToast('⚙️ Настройки сохранены!', 'success');
            render();
        }

        function requestVerification(reason) {
            if (!reason.trim()) {
                showToast('Напишите причину запроса на верификацию', 'error');
                return;
            }
            if (isBanned(state.currentUser.id)) {
                showToast('❌ Вы заблокированы и не можете запрашивать верификацию', 'error');
                return;
            }
            
            const existingRequest = state.verificationRequests.find(r => r.userId === state.currentUser.id && r.status === 'pending');
            if (existingRequest) {
                showToast('У вас уже есть активная заявка на верификацию', 'info');
                return;
            }
            
            const request = {
                id: 'vr' + Date.now(),
                userId: state.currentUser.id,
                userName: state.currentUser.name,
                userAvatar: state.currentUser.avatar,
                reason: reason.trim(),
                status: 'pending',
                timestamp: Date.now()
            };
            
            state.verificationRequests.push(request);
            saveData();
            
            if (state.adminId) {
                addNotification(state.adminId, 'verification_request', {
                    requestId: request.id,
                    userName: state.currentUser.name,
                    reason: reason.substring(0, 150)
                });
            }
            
            showToast('📋 Запрос на верификацию отправлен! Ожидайте решения администратора', 'success');
            render();
        }
        
        function approveVerification(requestId) {
            const request = state.verificationRequests.find(r => r.id === requestId);
            if (request) {
                request.status = 'approved';
                const user = state.users.find(u => u.id === request.userId);
                if (user) {
                    user.verified = true;
                    addNotification(user.id, 'verification_approved', {
                        message: 'Ваша заявка на верификацию одобрена! Теперь у вас есть синяя галочка рядом с именем.'
                    });
                    showToast(`✅ Верификация одобрена для ${user.name}!`, 'success');
                }
                saveData();
                render();
            }
        }
        
        function rejectVerification(requestId) {
            const request = state.verificationRequests.find(r => r.id === requestId);
            if (request) {
                request.status = 'rejected';
                const user = state.users.find(u => u.id === request.userId);
                if (user) {

                saveData();
                render();

        async function registerUserWithEmail(name, username, email, password) {
            if (!name || !username || !email || !password) {
                showToast('Заполните все поля', 'error');
                return false;
            }
            if (state.users.find(u => u.email === email)) {
                showToast('Email уже используется', 'error');
                return false;
            }
            if (state.users.find(u => u.username === username)) {
                showToast('Username уже используется', 'error');
                return false;
            }
            
            pendingRegistrationData = { name, username, email, password };
            const sent = await sendVerificationCode(email);
            if (sent) {
                return true;
            }
            pendingRegistrationData = null;
            return false;
        }
        
        function confirmRegistration(code) {
            if (!pendingRegistrationData) {
                showToast('Нет активной регистрации', 'error');
                return false;
            }
            
            const { name, username, email, password } = pendingRegistrationData;
            
            if (!verifyEmailCode(email, code)) {
                return false;
            }
            
            const isFirstUser = state.users.length === 0;
            
            const newUser = {
                id: 'u' + Date.now(),
                name: name,
                username: username,
                email: email,
                password: password,
                avatar: avatarPresets[0],
                cover: coverPresets[0],
                bio: '🌟 Новый пользователь NEXUS! Рад знакомству!',
                city: '',
                createdAt: new Date().toISOString(),
                verified: false
            };
            state.users.push(newUser);
            state.currentUser = newUser;
            
            if (isFirstUser) {
                state.adminId = newUser.id;
                showToast('👑 Вы стали администратором NEXUS! Теперь вы можете управлять пользователями и постами.', 'success');
            }
            
            pendingRegistrationData = null;
            saveData();
            showToast('🎉 Добро пожаловать в NEXUS!', 'success');
            return true;
        }

        function loginUser(email, password) {
            const user = state.users.find(u => u.email === email && u.password === password);
            if (user) {
                if (isBanned(user.id)) {
                    showBanNotification(user.id);
                    return false;
                }
                state.currentUser = user;
                unreadCount = state.notifications.filter(n => !n.read && n.userId === user.id).length;
                saveData();
                showToast(`👋 С возвращением, ${user.name}!`, 'success');
                return true;
            }
            showToast('Неверный email или пароль', 'error');
            return false;
        }

        function logout() {
            state.currentUser = null;
            unreadCount = 0;
            saveData();
            render();
        }

        function uploadAvatar(file) {
            if (isBanned(state.currentUser.id)) {
                showToast('❌ Вы заблокированы', 'error');
                return;
            }
            const reader = new FileReader();
            reader.onload = function(e) {
                updateProfile({ avatar: e.target.result });
                showToast('✅ Аватар загружен!', 'success');
            };
            reader.readAsDataURL(file);
        }

        function uploadCover(file) {
            if (isBanned(state.currentUser.id)) {
                showToast('❌ Вы заблокированы', 'error');
                return;
            }
            const reader = new FileReader();
            reader.onload = function(e) {
                updateProfile({ cover: e.target.result });
                showToast('✅ Обложка загружена!', 'success');
            };
            reader.readAsDataURL(file);
        }

                                                <div>
                                                    <div style="display: flex; align-items: center; gap: 6px; flex-wrap: wrap;">
                                                        <div style="font-weight: 600;">${escapeHtml(u.name)}</div>
                                                        ${u.verified ? `<span class="verified-badge" style="width: 14px; height: 14px;"><i class="fas fa-check-circle"></i></span>` : ''}
                                                        ${u.id === state.adminId ? `<span class="admin-badge" style="font-size: 8px;"><i class="fas fa-crown"></i> Admin</span>` : ''}
                                                        ${isUserBanned ? `<span class="banned-badge" style="font-size: 8px;"><i class="fas fa-ban"></i> Banned</span>` : ''}
                                                    </div>
                                                    <div style="font-size: 12px; color: rgba(255,255,255,0.5);">@${u.username}</div>
                                                    <div style="font-size: 10px; color: rgba(255,255,255,0.4);">${u.email}</div>
                                                </div>
                                            </div>
                                            <div style="display: flex; gap: 8px;">
                                                ${!isUserBanned && u.id !== state.currentUser.id ? 
                                                    `<button onclick="window.openBanUserModalExternal('${u.id}')" class="btn-danger" style="padding: 6px 16px; font-size: 12px;">🔨 Заблокировать</button>` : 
                                                    isUserBanned && u.id !== state.currentUser.id ?
                                                    `<button onclick="window.unbanUserExternal('${u.id}')" class="btn-secondary" style="padding: 6px 16px; font-size: 12px;">🔓 Разблокировать</button>` : ''
                                                }
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                                ${filteredUsers.length === 0 && searchQuery ? '<div style="text-align: center; padding: 40px; color: rgba(255,255,255,0.5);">Пользователи не найдены</div>' : ''}
                                ${state.users.length === 0 ? '<div style="text-align: center; padding: 40px; color: rgba(255,255,255,0.5);">Нет пользователей</div>' : ''}
                            </div>
                        </div>
                    </div>
                `;
            }

            app.innerHTML = `
                <div style="min-height: 100vh;">
                    <div style="position: sticky; top: 0; z-index: 100; background: rgba(15, 12, 41, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1);">
                        <div style="max-width: 1200px; margin: 0 auto; padding: 14px 24px;">
                            <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;">
                                <div style="display: flex; align-items: center; gap: 12px; cursor: pointer;" onclick="window.navigateToFeedExternal()">
                                    <img src="logo.png" style="height: 32px; width: auto; border-radius: 8px;">
                                    <span style="font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #8b5cf6, #ec489a); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">NEXUS</span>
                                </div>
                                
                                <div style="display: flex; gap: 12px; background: rgba(255,255,255,0.03); padding: 6px; border-radius: 60px; border: 1px solid rgba(255,255,255,0.1);">
                                    <button id="navFeed" class="nav-btn ${currentView.type === 'feed' ? 'active' : ''}" style="padding: 8px 28px;">
                                        <i class="fas fa-newspaper" style="margin-right: 8px;"></i>Лента
                                    </button>
                                    <button id="navFriends" class="nav-btn ${currentView.type === 'friends' ? 'active' : ''}" style="padding: 8px 28px;">
                                        <i class="fas fa-users" style="margin-right: 8px;"></i>Друзья
                                    </button>
                                    <button id="navProfile" class="nav-btn ${currentView.type === 'profile' && currentView.userId === user.id ? 'active' : ''}" style="padding: 8px 28px;">
                                        <i class="fas fa-user" style="margin-right: 8px;"></i>Профиль
                                    </button>
                                    ${userIsAdmin ? `
                                        <button id="navAdmin" class="nav-btn ${currentView.type === 'admin' ? 'active' : ''}" style="padding: 8px 28px;">
                                            <i class="fas fa-crown" style="margin-right: 8px;"></i>Админка
                                            ${pendingVerifications.length > 0 ? `<span style="background: #ec489a; padding: 2px 8px; border-radius: 20px; font-size: 10px; margin-left: 6px;">${pendingVerifications.length}</span>` : ''}
                                        </button>
                                    ` : ''}
                                </div>
                                
                                <div style="display: flex; align-items: center; gap: 16px; position: relative;">
                                    <div id="notificationBtn" style="position: relative; cursor: pointer;">
                                        <i class="fas fa-bell" id="bellIcon" style="font-size: 22px; color: rgba(255,255,255,0.8);"></i>
                                        ${unreadCount > 0 ? `<span id="notificationBadge" style="position: absolute; top: -8px; right: -8px; background: #ec489a; color: white; font-size: 10px; padding: 2px 6px; border-radius: 20px;">${unreadCount}</span>` : ''}
                                    </div>
                                    <div id="notificationDropdown" class="notification-dropdown">
                                        <div style="padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); font-weight: bold;">Уведомления</div>
                                        <div id="notificationList">
                                            ${userNotifications.length > 0 ? userNotifications.map(n => `
                                                <div class="notification-item ${!n.read ? 'unread' : ''}" onclick="window.handleNotificationClick('${n.id}', '${n.type}', '${n.data.postId || ''}')">
                                                    ${n.type === 'like' ? `❤️ <strong>${escapeHtml(n.data.userName)}</strong> лайкнул ваш пост` : ''}
                                                    ${n.type === 'comment' ? `💬 <strong>${escapeHtml(n.data.userName)}</strong> прокомментировал: "${escapeHtml(n.data.commentText)}"` : ''}
                                                    ${n.type === 'repost' ? `📢 <strong>${escapeHtml(n.data.userName)}</strong> сделал репост вашего поста${n.data.comment ? ` с комментарием` : ''}` : ''}
                                                    ${n.type === 'friend_request' ? `👥 <strong>${escapeHtml(n.data.userName)}</strong> хочет добавить вас в друзья` : ''}
                                                    ${n.type === 'friend_accept' ? `🎉 <strong>${escapeHtml(n.data.userName)}</strong> принял заявку в друзья` : ''}
                                                    ${n.type === 'verification_request' ? `📋 <strong>${escapeHtml(n.data.userName)}</strong> запросил верификацию` : ''}
                                                    ${n.type === 'verification_approved' ? `✅ <strong>Верификация одобрена!</strong>` : ''}
                                                    ${n.type === 'verification_rejected' ? `❌ <strong>Верификация отклонена</strong>` : ''}
                                                    ${n.type === 'user_banned' ? `🔨 <strong>Ваш аккаунт заблокирован</strong> администратором ${escapeHtml(n.data.adminName)}` : ''}
                                                    ${n.type === 'user_unbanned' ? `🔓 <strong>Ваш аккаунт разблокирован</strong> администратором ${escapeHtml(n.data.adminName)}` : ''}
                                                    ${n.type === 'post_deleted_by_admin' ? `🗑 <strong>Ваш пост удален</strong> администратором` : ''}
                                                    <div style="font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 4px;">${new Date(n.timestamp).toLocaleString()}</div>
                                                </div>
                                            `).join('') : '<div style="padding: 20px; text-align: center; color: rgba(255,255,255,0.5);">Нет уведомлений</div>'}
                                        </div>
                                    </div>
                                    <div class="avatar-wrapper" style="width: 44px; height: 44px; cursor: pointer; transition: transform 0.2s;" onclick="window.navigateToProfileExternal('${user.id}')">
                                        <img src="${user.avatar}" class="avatar-img" style="width: 44px; height: 44px;">
                                    </div>
                                    <button id="logoutBtn" class="btn-secondary" style="padding: 8px 24px;">
                                        <i class="fas fa-sign-out-alt" style="margin-right: 8px;"></i>Выйти
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div style="max-width: 1200px; margin: 0 auto; padding: 32px 24px;">
                        ${content}
                    </div>
                </div>
            `;

            document.getElementById('navFeed')?.addEventListener('click', () => navigateToFeed());
            document.getElementById('navFriends')?.addEventListener('click', () => navigateToFriends());
            document.getElementById('navProfile')?.addEventListener('click', () => navigateToProfile(user.id));
            document.getElementById('navAdmin')?.addEventListener('click', () => navigateToAdminPanel());
            document.getElementById('logoutBtn')?.addEventListener('click', () => logout());
            document.getElementById('requestVerificationBtn')?.addEventListener('click', () => openVerificationModal());
            document.getElementById('adminBanBtn')?.addEventListener('click', () => {
                if (currentView.type === 'profile') openBanUserModal(currentView.userId);
            });
            
            const publishBtn = document.getElementById('publishBtn');
            if (publishBtn) {
                publishBtn.addEventListener('click', async () => {
                    const content = document.getElementById('postContent').value;
                    if (!content.trim() && !currentPostImage) {
                        showToast('Напишите что-нибудь или добавьте фото', 'error');
                        return;
                    }
                    const success = await createPost(content, currentPostImage);
                    if (success) {
                        document.getElementById('postContent').value = '';
                        currentPostImage = null;
                        const preview = document.getElementById('imagePreview');
                        if (preview) {
                            preview.innerHTML = '';
                            preview.style.display = 'none';
                        }
                        render();
                    }
                });
            }
            
            const imageInput = document.getElementById('postImageInput');
            if (imageInput) {
                imageInput.addEventListener('change', async (e) => {
                    if (e.target.files && e.target.files[0]) {
                        const imgData = await uploadImage(e.target.files[0]);
                        currentPostImage = imgData;
                        const preview = document.getElementById('imagePreview');
                        preview.innerHTML = `
                            <div class="image-preview">
                                <img src="${imgData}">
                                <div class="remove-image" onclick="document.getElementById('imagePreview').innerHTML=''; currentPostImage=null; document.getElementById('imagePreview').style.display='none'">✖</div>
                            </div>
                        `;
                        preview.style.display = 'block';
                    }
                });
            }
            
            const notificationBtn = document.getElementById('notificationBtn');
            const notificationDropdown = document.getElementById('notificationDropdown');
            if (notificationBtn && notificationDropdown) {
                notificationBtn.onclick = (e) => {
                    e.stopPropagation();
                    if (notificationDropdown.classList.contains('show')) {
                        notificationDropdown.classList.remove('show');
                    } else {
                        notificationDropdown.classList.add('show');
                        markNotificationsRead();
                        const badge = document.getElementById('notificationBadge');
                        if (badge) badge.remove();
                        unreadCount = 0;
                    }
                };
                
                document.addEventListener('click', (e) => {
                    if (notificationDropdown && notificationBtn && !notificationBtn.contains(e.target) && !notificationDropdown.contains(e.target)) {
                        notificationDropdown.classList.remove('show');
                    }
                });
            }
            
            document.getElementById('toggleSettingsBtn')?.addEventListener('click', () => toggleSettings());
            document.getElementById('addFriendBtn')?.addEventListener('click', () => {
                if (currentView.type === 'profile') sendFriendRequest(currentView.userId);
            });
            
            document.getElementById('profileSettingsTab')?.addEventListener('click', () => setSettingsTab('profile'));
            document.getElementById('accountSettingsTab')?.addEventListener('click', () => setSettingsTab('account'));
            document.getElementById('systemSettingsTab')?.addEventListener('click', () => setSettingsTab('system'));
            
            const searchInput = document.getElementById('searchUsersInput');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    if (searchTimeout) clearTimeout(searchTimeout);
                    searchTimeout = setTimeout(() => {
                        searchQuery = e.target.value;
                        render();
                    }, 300);
                });
            }
            
            const searchAdminInput = document.getElementById('searchAdminInput');
            if (searchAdminInput) {
                searchAdminInput.addEventListener('input', (e) => {
                    if (searchTimeout) clearTimeout(searchTimeout);
                    searchTimeout = setTimeout(() => {
                        searchQuery = e.target.value;
                        render();
                    }, 300);
                });
            }
            
            const uploadAvatarInput = document.getElementById('uploadAvatar');
            if (uploadAvatarInput) {
                uploadAvatarInput.addEventListener('change', (e) => {
                    if (e.target.files[0]) uploadAvatar(e.target.files[0]);
                });
            }
            const uploadCoverInput = document.getElementById('uploadCover');
            if (uploadCoverInput) {
                uploadCoverInput.addEventListener('change', (e) => {
                    if (e.target.files[0]) uploadCover(e.target.files[0]);
                });
            }
            
            document.getElementById('saveSettingsBtn')?.addEventListener('click', () => {
                if (settingsTab === 'profile') {
                    const newName = document.getElementById('editName')?.value;
                    const newUsername = document.getElementById('editUsername')?.value;
                    const newBio = document.getElementById('editBio')?.value;
                    const newCity = document.getElementById('editCity')?.value;
                    if (newName) updateProfile({ name: newName });
                    if (newUsername) updateProfile({ username: newUsername });
                    if (newBio !== undefined) updateProfile({ bio: newBio });
                    if (newCity !== undefined) updateProfile({ city: newCity });
                } else if (settingsTab === 'account') {
                    const newEmail = document.getElementById('editEmail')?.value;
                    const newPassword = document.getElementById('newPassword')?.value;
                    const confirmPass = document.getElementById('confirmPassword')?.value;
                    const privacy = document.getElementById('privacySetting')?.value;
                    if (newEmail) updateProfile({ email: newEmail });
                    if (newPassword && newPassword === confirmPass) updateProfile({ password: newPassword });
                    if (privacy) updateSystemSettings({ privacy: privacy });
                } else if (settingsTab === 'system') {
                    const theme = document.getElementById('themeSetting')?.value;
                    const notifications = document.getElementById('notificationsToggle')?.checked;
                    const language = document.getElementById('languageSetting')?.value;
                    updateSystemSettings({ theme: theme, notifications: notifications, language: language });
                }
                settingsOpen = false;
                render();
            });
        }

        window.navigateToFeedExternal = () => navigateToFeed();
        window.navigateToProfileExternal = (id) => navigateToProfile(id);
        window.deletePostExternal = (id) => { 
            if (isAdmin(state.currentUser?.id)) {
                adminDeletePost(id);
            } else {
                deletePost(id);
            }
            render(); 
        };
        window.addCommentExternal = (postId, text) => { addComment(postId, text); render(); };
        window.acceptFriendRequestExternal = (id) => { acceptFriendRequest(id); render(); };
        window.openRepostModalExternal = (id) => { openRepostModal(id); };
        window.goToOriginalPostExternal = (id) => { goToOriginalPost(id); };
        window.approveVerificationExternal = (id) => { approveVerification(id); render(); };
        window.rejectVerificationExternal = (id) => { rejectVerification(id); render(); };
        window.openBanUserModalExternal = (id) => { openBanUserModal(id); };
        window.unbanUserExternal = (id) => { unbanUser(id); render(); };
        window.toggleCommentsExternal = (postId) => {
            const el = document.getElementById(`comments-${postId}`);
            if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
        };
        window.changeAvatarExternal = (avatar) => { updateProfile({ avatar: avatar }); render(); };
        window.changeCoverExternal = (cover) => { updateProfile({ cover: cover }); render(); };
        window.handleNotificationClick = (notifId, type, postId) => {
            const notif = state.notifications.find(n => n.id === notifId);
            if (notif) {
                notif.read = true;
                saveData();
                unreadCount = state.notifications.filter(n => !n.read && n.userId === state.currentUser?.id).length;
            }
            const dropdown = document.getElementById('notificationDropdown');
            if (dropdown) dropdown.classList.remove('show');
            if (postId) {
                goToOriginalPost(postId);
            }
            render();
        };
        window.showFriendsListExternal = (userId) => {
            const userFriends = getFriends(userId);
            const user = getUserById(userId);
            let friendsHtml = userFriends.map(f => `
                <div style="display: flex; gap: 12px; align-items: center; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer;" onclick="window.navigateToProfileExternal('${f.id}'); closeModal();">
                    <div class="avatar-wrapper" style="width: 48px; height: 48px;">
                        <img src="${f.avatar}" class="avatar-img" style="width: 48px; height: 48px;">
                    </div>
                    <div>
                        <div style="font-weight: 600;">${escapeHtml(f.name)}</div>
                        <div style="font-size: 12px; color: rgba(255,255,255,0.5);">@${f.username}</div>
                        ${f.verified ? `<span class="verified-badge" style="width: 12px; height: 12px;"><i class="fas fa-check-circle"></i></span>` : ''}
                        ${isAdmin(f.id) ? `<span class="admin-badge" style="font-size: 8px; padding: 2px 4px;"><i class="fas fa-crown"></i></span>` : ''}
                    </div>
                </div>
            `).join('');
            
            const modalHtml = `
                <div class="modal active" id="friendsModal" onclick="if(event.target === this) closeModal()">
                    <div class="modal-content" style="background: rgba(20, 20, 40, 0.95); backdrop-filter: blur(20px); border-radius: 24px; max-width: 450px; width: 90%; padding: 24px;">
                        <h2 style="font-size: 24px; font-weight: 700; margin-bottom: 20px;">👥 Друзья ${escapeHtml(user.name)}</h2>
                        <div style="max-height: 500px; overflow-y: auto;">
                            ${friendsHtml || '<div style="text-align: center; padding: 40px; color: rgba(255,255,255,0.5);">Нет друзей</div>'}
                        </div>
                        <button onclick="closeModal()" class="btn-secondary" style="width: 100%; margin-top: 20px;">Закрыть</button>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            window.closeModal = () => document.getElementById('friendsModal')?.remove();
        };

        document.addEventListener('click', (e) => {
            const likeBtn = e.target.closest('.like-btn');
            if (likeBtn) {
                const postId = likeBtn.dataset.post;
                if (postId) {
                    toggleLike(postId);
                    render();
                }
            }
        });

        (async () => {
            await loadData();
            initDemoData();
            render();
        })();
    </script>
</body>
</html>
