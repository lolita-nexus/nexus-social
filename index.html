<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NEXUS | Социальная платформа</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            transform: translateY(-4px);
            border-color: rgba(139, 92, 246, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        .btn-primary {
            background: linear-gradient(135deg, #8b5cf6, #ec489a);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.5);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .input-glow {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 14px 18px;
            color: white;
            font-size: 15px;
            transition: all 0.3s;
            width: 100%;
        }
        .input-glow:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(139, 92, 246, 0.5);
            border-radius: 16px;
            padding: 14px 24px;
            z-index: 1100;
            animation: slideInRight 0.3s ease;
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .avatar-wrapper {
            background: linear-gradient(135deg, #8b5cf6, #ec489a);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .verified-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            margin-left: 6px;
            cursor: pointer;
        }
        .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: linear-gradient(135deg, #ef4444, #ec489a);
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 10px;
            font-weight: 600;
            margin-left: 8px;
        }
        .banned-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: linear-gradient(135deg, #6b7280, #4b5563);
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 10px;
            font-weight: 600;
            margin-left: 8px;
        }
        .nav-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 28px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
            color: rgba(255, 255, 255, 0.7);
        }
        .nav-btn.active {
            background: linear-gradient(135deg, #8b5cf6, #ec489a);
            color: white;
        }
        .like-btn { transition: all 0.2s; cursor: pointer; }
        .like-btn.liked { color: #ec489a; }
        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
        .like-btn.liked { animation: heartBeat 0.4s ease; }
        .settings-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-out;
        }
        .settings-panel.open { max-height: 2000px; }
        .tab-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.6);
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #8b5cf6, #ec489a);
            color: white;
        }
        .avatar-option, .cover-option {
            cursor: pointer;
            transition: all 0.2s;
            border: 3px solid transparent;
        }
        .avatar-option.selected, .cover-option.selected { border-color: #8b5cf6; }
        .avatar-option:hover, .cover-option:hover { transform: scale(1.05); }
        .user-management-item {
            background: rgba(139, 92, 246, 0.1);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
        }
        .verification-request {
            background: rgba(139, 92, 246, 0.1);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // ========== СОСТОЯНИЕ ==========
        let state = {
            currentUser: null,
            users: [],
            posts: [],
            comments: [],
            likes: [],
            friends: [],
            notifications: [],
            verificationRequests: [],
            bannedUsers: [],
            systemSettings: { theme: 'dark', notifications: true, language: 'ru', privacy: 'public' },
            adminId: null,
            pendingEmailVerifications: {}
        };

        let unreadCount = 0;
        let pendingRegistrationData = null;
        let currentView = { type: 'feed', userId: null };
        let settingsOpen = false;
        let settingsTab = 'profile';

        const avatarPresets = [
            'https://api.dicebear.com/7.x/avataaars/svg?seed=Avatar1&backgroundColor=8b5cf6',
            'https://api.dicebear.com/7.x/avataaars/svg?seed=Avatar2&backgroundColor=ec489a',
            'https://api.dicebear.com/7.x/avataaars/svg?seed=Avatar3&backgroundColor=10b981',
            'https://api.dicebear.com/7.x/avataaars/svg?seed=Avatar4&backgroundColor=f59e0b',
            'https://api.dicebear.com/7.x/avataaars/svg?seed=Avatar5&backgroundColor=ef4444',
            'https://api.dicebear.com/7.x/avataaars/svg?seed=Avatar6&backgroundColor=06b6d4'
        ];

        const coverPresets = [
            'https://images.unsplash.com/photo-1579546929518-9e396f3cc809?w=800',
            'https://images.unsplash.com/photo-1533174072545-7a4b6ad7a6c3?w=800',
            'https://images.unsplash.com/photo-1516483638261-f4dbaf036963?w=800',
            'https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=800'
        ];

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}" style="margin-right: 8px;"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function saveData() {
            localStorage.setItem('nexus_data', JSON.stringify({
                users: state.users,
                posts: state.posts,
                comments: state.comments,
                likes: state.likes,
                friends: state.friends,
                notifications: state.notifications,
                verificationRequests: state.verificationRequests,
                bannedUsers: state.bannedUsers,
                systemSettings: state.systemSettings,
                currentUser: state.currentUser,
                adminId: state.adminId,
                pendingEmailVerifications: state.pendingEmailVerifications
            }));
        }

        function loadData() {
            const saved = localStorage.getItem('nexus_data');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    state.users = data.users || [];
                    state.posts = data.posts || [];
                    state.comments = data.comments || [];
                    state.likes = data.likes || [];
                    state.friends = data.friends || [];
                    state.notifications = data.notifications || [];
                    state.verificationRequests = data.verificationRequests || [];
                    state.bannedUsers = data.bannedUsers || [];
                    state.systemSettings = data.systemSettings || { theme: 'dark', notifications: true, language: 'ru', privacy: 'public' };
                    state.currentUser = data.currentUser || null;
                    state.adminId = data.adminId || null;
                    state.pendingEmailVerifications = data.pendingEmailVerifications || {};
                    unreadCount = state.notifications.filter(n => !n.read && n.userId === state.currentUser?.id).length;
                } catch(e) {}
            }
        }

        function initDemoData() {
            if (state.users.length > 0) return;
            state.users = [];
            state.adminId = null;
            saveData();
        }

        function getUserById(id) {
            return state.users.find(u => u.id === id);
        }

        function isAdmin(userId) {
            return state.adminId === userId;
        }

        function isBanned(userId) {
            const ban = state.bannedUsers.find(b => b.userId === userId);
            if (!ban) return false;
            if (ban.expiresAt && ban.expiresAt < Date.now()) {
                state.bannedUsers = state.bannedUsers.filter(b => b.userId !== userId);
                saveData();
                return false;
            }
            return true;
        }

        function addNotification(userId, type, data) {
            state.notifications.push({
                id: 'n' + Date.now(),
                userId: userId,
                type: type,
                data: data,
                read: false,
                timestamp: Date.now()
            });
            if (userId === state.currentUser?.id && state.systemSettings.notifications) unreadCount++;
            saveData();
        }

        async function sendVerificationCode(email) {
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            state.pendingEmailVerifications[email] = { code, expiresAt: Date.now() + 10 * 60 * 1000 };
            saveData();
            
            try {
                const response = await fetch('/.netlify/functions/send-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, code })
                });
                const data = await response.json();
                if (response.ok && data.success) {
                    showToast(`Код отправлен на ${email}`, 'success');
                    return true;
                } else {
                    showToast(data.error || 'Ошибка отправки', 'error');
                    return false;
                }
            } catch (error) {
                showToast('Ошибка соединения', 'error');
                return false;
            }
        }

        function verifyEmailCode(email, code) {
            const pending = state.pendingEmailVerifications[email];
            if (!pending) { showToast('Код не найден', 'error'); return false; }
            if (Date.now() > pending.expiresAt) { delete state.pendingEmailVerifications[email]; showToast('Код истек', 'error'); return false; }
            if (pending.code === code) { delete state.pendingEmailVerifications[email]; showToast('✅ Email подтвержден!', 'success'); return true; }
            showToast('Неверный код', 'error');
            return false;
        }

        async function registerUserWithEmail(name, username, email, password) {
            if (!name || !username || !email || !password) { showToast('Заполните все поля', 'error'); return false; }
            if (state.users.find(u => u.email === email)) { showToast('Email уже используется', 'error'); return false; }
            if (state.users.find(u => u.username === username)) { showToast('Username уже используется', 'error'); return false; }
            
            pendingRegistrationData = { name, username, email, password };
            const sent = await sendVerificationCode(email);
            if (sent) return true;
            pendingRegistrationData = null;
            return false;
        }

        function confirmRegistration(code) {
            if (!pendingRegistrationData) { showToast('Нет активной регистрации', 'error'); return false; }
            const { name, username, email, password } = pendingRegistrationData;
            if (!verifyEmailCode(email, code)) return false;
            
            const isFirstUser = state.users.length === 0;
            const newUser = {
                id: 'u' + Date.now(),
                name, username, email, password,
                avatar: avatarPresets[0],
                cover: coverPresets[0],
                bio: '🌟 Новый пользователь NEXUS!',
                city: '',
                createdAt: new Date().toISOString(),
                verified: false
            };
            state.users.push(newUser);
            state.currentUser = newUser;
            if (isFirstUser) {
                state.adminId = newUser.id;
                showToast('👑 Вы стали администратором NEXUS!', 'success');
            }
            pendingRegistrationData = null;
            saveData();
            showToast('🎉 Добро пожаловать в NEXUS!', 'success');
            return true;
        }

        function loginUser(email, password) {
            const user = state.users.find(u => u.email === email && u.password === password);
            if (user) {
                if (isBanned(user.id)) { showToast('❌ Вы заблокированы', 'error'); return false; }
                state.currentUser = user;
                unreadCount = state.notifications.filter(n => !n.read && n.userId === user.id).length;
                saveData();
                showToast(`👋 С возвращением, ${user.name}!`, 'success');
                return true;
            }
            showToast('Неверный email или пароль', 'error');
            return false;
        }

        function logout() { state.currentUser = null; saveData(); render(); }

        // Основные функции
        function getAllPosts() { return [...state.posts].sort((a, b) => b.timestamp - a.timestamp); }
        function getPostsByUser(userId) { return state.posts.filter(p => p.userId === userId).sort((a, b) => b.timestamp - a.timestamp); }
        function getCommentsForPost(postId) { return state.comments.filter(c => c.postId === postId).sort((a, b) => a.timestamp - b.timestamp); }
        function getLikesCount(postId) { return state.likes.filter(l => l.postId === postId).length; }
        function isLiked(postId, userId) { return state.likes.some(l => l.postId === postId && l.userId === userId); }
        function getFriends(userId) {
            const friendships = state.friends.filter(f => (f.userId === userId && f.status === 'accepted') || (f.friendId === userId && f.status === 'accepted'));
            return friendships.map(f => getUserById(f.userId === userId ? f.friendId : f.userId)).filter(Boolean);
        }

        function createPost(content) {
            if (!content.trim()) return false;
            if (isBanned(state.currentUser.id)) { showToast('❌ Вы заблокированы', 'error'); return false; }
            state.posts.unshift({ id: 'p' + Date.now(), userId: state.currentUser.id, content: content.trim(), timestamp: Date.now() });
            saveData();
            showToast('✨ Пост опубликован!', 'success');
            return true;
        }

        function deletePost(postId) {
            const post = state.posts.find(p => p.id === postId);
            if (post && (post.userId === state.currentUser.id || isAdmin(state.currentUser.id))) {
                state.posts = state.posts.filter(p => p.id !== postId);
                state.comments = state.comments.filter(c => c.postId !== postId);
                state.likes = state.likes.filter(l => l.postId !== postId);
                saveData();
                showToast('🗑 Пост удален', 'success');
                return true;
            }
            return false;
        }

        function addComment(postId, text) {
            if (!text.trim()) return false;
            if (isBanned(state.currentUser.id)) { showToast('❌ Вы заблокированы', 'error'); return false; }
            state.comments.push({ id: 'c' + Date.now(), postId, userId: state.currentUser.id, text: text.trim(), timestamp: Date.now() });
            saveData();
            showToast('💬 Комментарий добавлен', 'success');
            return true;
        }

        function toggleLike(postId) {
            const existing = state.likes.find(l => l.postId === postId && l.userId === state.currentUser.id);
            if (existing) state.likes = state.likes.filter(l => l.id !== existing.id);
            else state.likes.push({ id: 'l' + Date.now(), postId, userId: state.currentUser.id, timestamp: Date.now() });
            saveData();
            render();
        }

        function sendFriendRequest(userId) {
            if (userId === state.currentUser.id) return;
            if (getFriends(state.currentUser.id).some(f => f.id === userId)) { showToast('Уже друзья', 'info'); return; }
            if (state.friends.some(f => (f.userId === state.currentUser.id && f.friendId === userId) || (f.userId === userId && f.friendId === state.currentUser.id))) {
                showToast('Заявка уже отправлена', 'info'); return;
            }
            state.friends.push({ id: 'f' + Date.now(), userId: state.currentUser.id, friendId: userId, status: 'pending' });
            addNotification(userId, 'friend_request', { userName: state.currentUser.name });
            saveData();
            showToast('📨 Заявка отправлена!', 'success');
        }

        function acceptFriendRequest(requestId) {
            const request = state.friends.find(f => f.id === requestId);
            if (request) { request.status = 'accepted'; saveData(); showToast('🎉 Теперь вы друзья!', 'success'); render(); }
        }

        function updateProfile(updates) {
            if (isBanned(state.currentUser.id)) { showToast('❌ Вы заблокированы', 'error'); return; }
            Object.assign(state.currentUser, updates);
            const index = state.users.findIndex(u => u.id === state.currentUser.id);
            if (index !== -1) state.users[index] = state.currentUser;
            saveData();
            showToast('✅ Профиль обновлен!', 'success');
            render();
        }

        function updateSystemSettings(updates) {
            Object.assign(state.systemSettings, updates);
            saveData();
            showToast('⚙️ Настройки сохранены!', 'success');
            render();
        }

        function requestVerification(reason) {
            if (!reason.trim()) { showToast('Напишите причину', 'error'); return; }
            if (state.verificationRequests.some(r => r.userId === state.currentUser.id && r.status === 'pending')) {
                showToast('У вас уже есть заявка', 'info'); return;
            }
            state.verificationRequests.push({
                id: 'vr' + Date.now(),
                userId: state.currentUser.id,
                userName: state.currentUser.name,
                userAvatar: state.currentUser.avatar,
                reason: reason.trim(),
                status: 'pending',
                timestamp: Date.now()
            });
            saveData();
            if (state.adminId) addNotification(state.adminId, 'verification_request', { userName: state.currentUser.name, reason: reason.substring(0, 100) });
            showToast('📋 Запрос отправлен!', 'success');
            render();
        }

        function approveVerification(requestId) {
            const request = state.verificationRequests.find(r => r.id === requestId);
            if (request) {
                request.status = 'approved';
                const user = state.users.find(u => u.id === request.userId);
                if (user) { user.verified = true; addNotification(user.id, 'verification_approved', {}); showToast(`✅ Верификация одобрена для ${user.name}!`, 'success'); }
                saveData();
                render();
            }
        }

        function rejectVerification(requestId) {
            const request = state.verificationRequests.find(r => r.id === requestId);
            if (request) { request.status = 'rejected'; addNotification(request.userId, 'verification_rejected', {}); showToast(`❌ Верификация отклонена`, 'info'); saveData(); render(); }
        }

        function banUser(userId, reason, expiresAt) {
            const user = getUserById(userId);
            if (!user) return;
            const existing = state.bannedUsers.find(b => b.userId === userId);
            if (existing) { existing.reason = reason; existing.expiresAt = expiresAt; existing.bannedAt = Date.now(); }
            else state.bannedUsers.push({ userId, reason, bannedAt: Date.now(), expiresAt, bannedBy: state.currentUser.id });
            saveData();
            addNotification(userId, 'user_banned', { reason, adminName: state.currentUser.name });
            showToast(`🔨 ${user.name} заблокирован`, 'success');
            if (state.currentUser?.id === userId) setTimeout(() => logout(), 2000);
            render();
        }

        function unbanUser(userId) {
            state.bannedUsers = state.bannedUsers.filter(b => b.userId !== userId);
            saveData();
            showToast(`🔓 Пользователь разблокирован`, 'success');
            render();
        }

        function openBanModal(userId) {
            const user = getUserById(userId);
            if (!user || userId === state.currentUser.id) return;
            const modalHtml = `
                <div class="modal active" id="banModal" onclick="if(event.target===this) closeModal()">
                    <div class="modal-content" style="background:rgba(20,20,40,0.98);border-radius:24px;max-width:500px;width:90%;padding:24px">
                        <h2>🔨 Блокировка</h2>
                        <p>Пользователь: <strong>${escapeHtml(user.name)}</strong></p>
                        <div style="margin:16px 0"><label>Причина:</label><textarea id="banReason" rows="3" class="input-glow" style="margin-top:8px"></textarea></div>
                        <div style="display:flex;gap:12px">
                            <button id="confirmBan" class="btn-danger">Заблокировать</button>
                            <button onclick="closeModal()" class="btn-secondary">Отмена</button>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            document.getElementById('confirmBan').onclick = () => {
                const reason = document.getElementById('banReason').value;
                if (reason) banUser(userId, reason, null);
                closeModal();
            };
            window.closeModal = () => document.getElementById('banModal')?.remove();
        }

        // Навигация
        function navigateToFeed() { currentView = { type: 'feed' }; settingsOpen = false; render(); }
        function navigateToProfile(userId) { currentView = { type: 'profile', userId }; settingsOpen = false; render(); }
        function navigateToFriends() { currentView = { type: 'friends' }; settingsOpen = false; render(); }
        function navigateToAdmin() { currentView = { type: 'admin' }; settingsOpen = false; render(); }
        function toggleSettings() { settingsOpen = !settingsOpen; render(); }
        function setSettingsTab(tab) { settingsTab = tab; render(); }

        // Рендер
        function render() {
            if (!state.currentUser) renderAuth();
            else renderMain();
        }

        function renderAuth() {
            const app = document.getElementById('app');
            let isLogin = true;
            let showVerification = false;

            function refresh() {
                app.innerHTML = `
                    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px">
                        <div class="glass" style="max-width:480px;width:100%;padding:48px">
                            <div style="text-align:center;margin-bottom:40px">
                                <div style="font-size:64px">✨</div>
                                <h1 style="font-size:42px;font-weight:800;background:linear-gradient(135deg,#8b5cf6,#ec489a);-webkit-background-clip:text;-webkit-text-fill-color:transparent">NEXUS</h1>
                                <p style="color:rgba(255,255,255,0.7)">Социальная платформа</p>
                                <p style="color:#ec489a;font-size:12px">✉️ Требуется подтверждение email</p>
                            </div>
                            ${!showVerification ? `
                                <div style="display:flex;gap:12px;margin-bottom:32px">
                                    <button id="loginTab" style="flex:1;padding:12px;border:none;border-radius:40px;font-weight:600;cursor:pointer;background:${isLogin ? 'linear-gradient(135deg,#8b5cf6,#ec489a)' : 'rgba(255,255,255,0.1)'};color:white">Вход</button>
                                    <button id="registerTab" style="flex:1;padding:12px;border:none;border-radius:40px;font-weight:600;cursor:pointer;background:${!isLogin ? 'linear-gradient(135deg,#8b5cf6,#ec489a)' : 'rgba(255,255,255,0.1)'};color:white">Регистрация</button>
                                </div>
                                <div id="authForm">
                                    ${isLogin ? `
                                        <input type="email" id="loginEmail" placeholder="Email" class="input-glow" style="margin-bottom:16px">
                                        <input type="password" id="loginPassword" placeholder="Пароль" class="input-glow" style="margin-bottom:24px">
                                        <button id="loginBtn" class="btn-primary" style="width:100%">Войти</button>
                                    ` : `
                                        <input type="text" id="regName" placeholder="Полное имя" class="input-glow" style="margin-bottom:12px">
                                        <input type="text" id="regUsername" placeholder="Имя пользователя" class="input-glow" style="margin-bottom:12px">
                                        <input type="email" id="regEmail" placeholder="Email" class="input-glow" style="margin-bottom:12px">
                                        <input type="password" id="regPassword" placeholder="Пароль" class="input-glow" style="margin-bottom:24px">
                                        <button id="registerBtn" class="btn-primary" style="width:100%">Зарегистрироваться</button>
                                        <p style="text-align:center;font-size:12px;color:rgba(255,255,255,0.5);margin-top:16px">✉️ На почту придет код</p>
                                        <p style="text-align:center;font-size:12px;color:#8b5cf6">👑 Первый пользователь = Администратор</p>
                                    `}
                                </div>
                            ` : `
                                <div>
                                    <h2 style="text-align:center;margin-bottom:20px">✉️ Подтверждение email</h2>
                                    <p style="text-align:center;margin-bottom:20px">Код отправлен на <strong>${pendingRegistrationData?.email || ''}</strong></p>
                                    <input type="text" id="verificationCode" placeholder="Введите код" class="input-glow" style="margin-bottom:16px;text-align:center;font-size:20px">
                                    <button id="confirmCodeBtn" class="btn-primary" style="width:100%;margin-bottom:12px">Подтвердить</button>
                                    <button id="resendCodeBtn" class="btn-secondary" style="width:100%">Отправить повторно</button>
                                    <button id="backToRegisterBtn" style="background:none;border:none;color:rgba(255,255,255,0.5);margin-top:16px;width:100%;cursor:pointer">← Назад</button>
                                </div>
                            `}
                        </div>
                    </div>
                `;
                if (!showVerification) {
                    document.getElementById('loginTab')?.addEventListener('click', () => { isLogin = true; showVerification = false; refresh(); });
                    document.getElementById('registerTab')?.addEventListener('click', () => { isLogin = false; showVerification = false; refresh(); });
                    if (isLogin) {
                        document.getElementById('loginBtn')?.addEventListener('click', () => {
                            const email = document.getElementById('loginEmail').value;
                            const password = document.getElementById('loginPassword').value;
                            if (loginUser(email, password)) render();
                        });
                    } else {
                        document.getElementById('registerBtn')?.addEventListener('click', async () => {
                            const name = document.getElementById('regName').value;
                            const username = document.getElementById('regUsername').value;
                            const email = document.getElementById('regEmail').value;
                            const password = document.getElementById('regPassword').value;
                            if (await registerUserWithEmail(name, username, email, password)) { showVerification = true; refresh(); }
                        });
                    }
                } else {
                    document.getElementById('confirmCodeBtn')?.addEventListener('click', () => {
                        if (confirmRegistration(document.getElementById('verificationCode').value)) render();
                    });
                    document.getElementById('resendCodeBtn')?.addEventListener('click', async () => {
                        if (pendingRegistrationData) await sendVerificationCode(pendingRegistrationData.email);
                    });
                    document.getElementById('backToRegisterBtn')?.addEventListener('click', () => { showVerification = false; pendingRegistrationData = null; refresh(); });
                }
            }
            refresh();
        }

        function renderMain() {
            const app = document.getElementById('app');
            const user = state.currentUser;
            const isAdminUser = isAdmin(user.id);
            const allPosts = getAllPosts();
            const friends = getFriends(user.id);
            const pendingFriendRequests = state.friends.filter(f => f.friendId === user.id && f.status === 'pending');
            const pendingVerifications = state.verificationRequests.filter(r => r.status === 'pending');

            let content = '';
            if (currentView.type === 'feed') {
                content = `
                    <div style="max-width:680px;margin:0 auto">
                        <div class="glass-card" style="padding:24px;margin-bottom:24px">
                            <textarea id="postContent" rows="2" placeholder="Что нового?" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:14px;color:white;resize:none;font-family:inherit"></textarea>
                            <div style="display:flex;justify-content:flex-end;margin-top:12px"><button id="publishBtn" class="btn-primary">Опубликовать ✨</button></div>
                        </div>
                        ${allPosts.map(post => {
                            const author = getUserById(post.userId);
                            if (!author) return '';
                            const comments = getCommentsForPost(post.id);
                            const likesCount = getLikesCount(post.id);
                            const liked = isLiked(post.id, user.id);
                            return `
                                <div class="glass-card" style="padding:24px;margin-bottom:20px" id="post-${post.id}">
                                    <div style="display:flex;justify-content:space-between">
                                        <div style="display:flex;gap:12px;cursor:pointer" onclick="window.navigateToProfileExternal('${author.id}')">
                                            <div class="avatar-wrapper" style="width:48px;height:48px"><img src="${author.avatar}" class="avatar-img"></div>
                                            <div>
                                                <div style="display:flex;align-items:center;gap:6px"><span style="font-weight:600">${escapeHtml(author.name)}</span>${author.verified ? '<span class="verified-badge"><i class="fas fa-check-circle"></i></span>' : ''}${isAdmin(author.id) ? '<span class="admin-badge"><i class="fas fa-crown"></i> Admin</span>' : ''}</div>
                                                <div style="font-size:12px;color:rgba(255,255,255,0.5)">${new Date(post.timestamp).toLocaleString()}</div>
                                            </div>
                                        </div>
                                        ${(author.id === user.id || isAdminUser) ? `<button onclick="window.deletePostExternal('${post.id}')" style="background:none;border:none;color:rgba(255,255,255,0.5);cursor:pointer"><i class="fas fa-trash"></i></button>` : ''}
                                    </div>
                                    <div style="margin:16px 0"><p>${escapeHtml(post.content)}</p></div>
                                    <div style="display:flex;gap:20px;padding:12px 0;border-top:1px solid rgba(255,255,255,0.1);border-bottom:1px solid rgba(255,255,255,0.1)">
                                        <button class="like-btn ${liked ? 'liked' : ''}" data-post="${post.id}" style="background:none;border:none;cursor:pointer;color:${liked ? '#ec489a' : 'rgba(255,255,255,0.6)'}"><i class="fas fa-heart"></i> ${likesCount}</button>
                                        <button onclick="window.toggleCommentsExternal('${post.id}')" style="background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.6)"><i class="fas fa-comment"></i> ${comments.length}</button>
                                        <button onclick="window.sendFriendExternal('${author.id}')" style="background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.6)"><i class="fas fa-user-plus"></i></button>
                                    </div>
                                    <div id="comments-${post.id}" style="margin-top:16px">
                                        ${comments.map(c => {
                                            const cu = getUserById(c.userId);
                                            return `<div style="display:flex;gap:10px;margin-bottom:12px"><div class="avatar-wrapper" style="width:32px;height:32px" onclick="window.navigateToProfileExternal('${cu.id}')"><img src="${cu.avatar}" class="avatar-img"></div><div style="flex:1;background:rgba(255,255,255,0.05);border-radius:18px;padding:8px 14px"><span style="font-weight:600;cursor:pointer" onclick="window.navigateToProfileExternal('${cu.id}')">${escapeHtml(cu.name)}</span> <span>${escapeHtml(c.text)}</span></div></div>`;
                                        }).join('')}
                                        <div style="display:flex;gap:10px;margin-top:12px">
                                            <div class="avatar-wrapper" style="width:32px;height:32px"><img src="${user.avatar}" class="avatar-img"></div>
                                            <div style="flex:1;display:flex;gap:8px"><input type="text" id="commentInput-${post.id}" placeholder="Написать комментарий..." style="flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:10px 16px;color:white"><button onclick="window.addCommentExternal('${post.id}', document.getElementById('commentInput-${post.id}').value)" style="background:linear-gradient(135deg,#8b5cf6,#ec489a);border:none;border-radius:50%;width:40px;height:40px;cursor:pointer"><i class="fas fa-arrow-right"></i></button></div>
                                        </div>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                        ${allPosts.length === 0 ? '<div style="text-align:center;padding:60px;color:rgba(255,255,255,0.5)">✨ Нет постов. Будьте первым!</div>' : ''}
                    </div>
                `;
            } else if (currentView.type === 'profile') {
                const profileUser = getUserById(currentView.userId) || user;
                const isOwn = profileUser.id === user.id;
                const userPosts = getPostsByUser(profileUser.id);
                content = `
                    <div style="max-width:880px;margin:0 auto">
                        <div class="glass-card" style="overflow:hidden;margin-bottom:24px">
                            <img src="${profileUser.cover}" style="width:100%;height:200px;object-fit:cover">
                            <div style="padding:24px;margin-top:-50px;position:relative">
                                <div style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap">
                                    <div style="display:flex;gap:20px;align-items:flex-end">
                                        <div class="avatar-wrapper" style="width:100px;height:100px"><img src="${profileUser.avatar}" class="avatar-img"></div>
                                        <div>
                                            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                                                <h1 style="font-size:32px">${escapeHtml(profileUser.name)}</h1>
                                                ${profileUser.verified ? '<span class="verified-badge"><i class="fas fa-check-circle"></i></span>' : ''}
                                                ${isAdmin(profileUser.id) ? '<span class="admin-badge"><i class="fas fa-crown"></i> Администратор</span>' : ''}
                                            </div>
                                            <p style="color:rgba(255,255,255,0.6)">@${profileUser.username}</p>
                                            <p>${escapeHtml(profileUser.bio)}</p>
                                        </div>
                                    </div>
                                    ${!isOwn ? `<button id="addFriendBtn" class="btn-secondary">${getFriends(user.id).some(f=>f.id===profileUser.id) ? '✓ В друзьях' : '➕ Добавить'}</button>` : `<button id="editProfileBtn" class="btn-secondary"><i class="fas fa-edit"></i> Редактировать</button>`}
                                </div>
                            </div>
                        </div>
                        <h2>📝 Посты (${userPosts.length})</h2>
                        ${userPosts.map(post => {
                            const comments = getCommentsForPost(post.id);
                            const likesCount = getLikesCount(post.id);
                            const liked = isLiked(post.id, user.id);
                            return `
                                <div class="glass-card" style="padding:24px;margin-bottom:20px">
                                    <p>${escapeHtml(post.content)}</p>
                                    <div style="display:flex;gap:20px;margin-top:12px">
                                        <button class="like-btn ${liked ? 'liked' : ''}" data-post="${post.id}" style="background:none;border:none;cursor:pointer;color:${liked ? '#ec489a' : 'rgba(255,255,255,0.6)'}"><i class="fas fa-heart"></i> ${likesCount}</button>
                                        <span><i class="fas fa-comment"></i> ${comments.length}</span>
                                        ${isOwn || isAdminUser ? `<button onclick="window.deletePostExternal('${post.id}')" style="background:none;border:none;color:rgba(255,255,255,0.5)"><i class="fas fa-trash"></i></button>` : ''}
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
            } else if (currentView.type === 'friends') {
                content = `
                    <div style="max-width:680px;margin:0 auto">
                        ${pendingFriendRequests.length > 0 ? `
                            <div class="glass-card" style="padding:24px;margin-bottom:24px">
                                <h3>📨 Заявки в друзья</h3>
                                ${pendingFriendRequests.map(req => {
                                    const reqUser = getUserById(req.userId);
                                    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:1px solid rgba(255,255,255,0.1)"><div><strong>${escapeHtml(reqUser.name)}</strong> @${reqUser.username}</div><button onclick="window.acceptFriendExternal('${req.id}')" class="btn-primary" style="padding:6px 16px">Принять</button></div>`;
                                }).join('')}
                            </div>
                        ` : ''}
                        <div class="glass-card" style="padding:24px">
                            <h3>👥 Друзья (${friends.length})</h3>
                            ${friends.map(f => `<div style="display:flex;align-items:center;gap:12px;padding:12px;border-bottom:1px solid rgba(255,255,255,0.1);cursor:pointer" onclick="window.navigateToProfileExternal('${f.id}')"><div class="avatar-wrapper" style="width:40px;height:40px"><img src="${f.avatar}" class="avatar-img"></div><div><strong>${escapeHtml(f.name)}</strong><br><span style="font-size:12px;color:rgba(255,255,255,0.5)">@${f.username}</span></div></div>`).join('')}
                            ${friends.length === 0 ? '<p style="text-align:center;padding:40px">У вас пока нет друзей</p>' : ''}
                        </div>
                    </div>
                `;
            } else if (currentView.type === 'admin' && isAdminUser) {
                content = `
                    <div style="max-width:800px;margin:0 auto">
                        <div class="glass-card" style="padding:24px">
                            <h2>👑 Админ-панель</h2>
                            <div style="margin:24px 0"><h3>✅ Заявки на верификацию (${pendingVerifications.length})</h3>
                                ${pendingVerifications.map(r => `
                                    <div class="verification-request">
                                        <div style="display:flex;gap:12px;align-items:center"><div class="avatar-wrapper" style="width:48px;height:48px"><img src="${r.userAvatar}" class="avatar-img"></div><div><strong>${escapeHtml(r.userName)}</strong><br><small>${new Date(r.timestamp).toLocaleString()}</small></div></div>
                                        <p style="margin:12px 0">Причина: ${escapeHtml(r.reason)}</p>
                                        <div style="display:flex;gap:12px"><button onclick="window.approveVerificationExternal('${r.id}')" class="btn-primary">✅ Одобрить</button><button onclick="window.rejectVerificationExternal('${r.id}')" class="btn-secondary">❌ Отклонить</button></div>
                                    </div>
                                `).join('')}
                                ${pendingVerifications.length === 0 ? '<p>Нет заявок</p>' : ''}
                            </div>
                            <div><h3>👥 Пользователи</h3>
                                ${state.users.map(u => `
                                    <div class="user-management-item" style="display:flex;justify-content:space-between;align-items:center">
                                        <div style="display:flex;gap:12px;align-items:center"><div class="avatar-wrapper" style="width:40px;height:40px"><img src="${u.avatar}" class="avatar-img"></div><div><strong>${escapeHtml(u.name)}</strong><br>@${u.username}${u.verified ? ' ✅' : ''}${u.id === state.adminId ? ' 👑' : ''}</div></div>
                                        <div><button onclick="window.banUserExternal('${u.id}')" class="btn-danger" style="padding:6px 12px">🔨 Бан</button></div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }

            app.innerHTML = `
                <div style="min-height:100vh">
                    <div style="position:sticky;top:0;z-index:100;background:rgba(15,12,41,0.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.1)">
                        <div style="max-width:1200px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px">
                            <div style="display:flex;align-items:center;gap:12px;cursor:pointer" onclick="window.navigateToFeedExternal()"><span style="font-size:32px">✨</span><span style="font-size:24px;font-weight:800;background:linear-gradient(135deg,#8b5cf6,#ec489a);-webkit-background-clip:text;-webkit-text-fill-color:transparent">NEXUS</span></div>
                            <div style="display:flex;gap:12px">
                                <button id="navFeed" class="nav-btn ${currentView.type === 'feed' ? 'active' : ''}"><i class="fas fa-newspaper"></i> Лента</button>
                                <button id="navFriends" class="nav-btn ${currentView.type === 'friends' ? 'active' : ''}"><i class="fas fa-users"></i> Друзья</button>
                                <button id="navProfile" class="nav-btn ${currentView.type === 'profile' && currentView.userId === user.id ? 'active' : ''}"><i class="fas fa-user"></i> Профиль</button>
                                ${isAdminUser ? `<button id="navAdmin" class="nav-btn ${currentView.type === 'admin' ? 'active' : ''}"><i class="fas fa-crown"></i> Админка</button>` : ''}
                            </div>
                            <div style="display:flex;align-items:center;gap:16px">
                                <div class="avatar-wrapper" style="width:44px;height:44px;cursor:pointer" onclick="window.navigateToProfileExternal('${user.id}')"><img src="${user.avatar}" class="avatar-img"></div>
                                <button id="logoutBtn" class="btn-secondary"><i class="fas fa-sign-out-alt"></i> Выйти</button>
                            </div>
                        </div>
                    </div>
                    <div style="max-width:1200px;margin:0 auto;padding:32px 24px">${content}</div>
                </div>
            `;

            document.getElementById('navFeed')?.addEventListener('click', () => navigateToFeed());
            document.getElementById('navFriends')?.addEventListener('click', () => navigateToFriends());
            document.getElementById('navProfile')?.addEventListener('click', () => navigateToProfile(user.id));
            document.getElementById('navAdmin')?.addEventListener('click', () => navigateToAdmin());
            document.getElementById('logoutBtn')?.addEventListener('click', () => logout());
            document.getElementById('publishBtn')?.addEventListener('click', () => {
                const content = document.getElementById('postContent');
                if (content?.value.trim()) { createPost(content.value); content.value = ''; render(); }
            });
            document.getElementById('addFriendBtn')?.addEventListener('click', () => sendFriendRequest(currentView.userId));
            document.getElementById('editProfileBtn')?.addEventListener('click', () => toggleSettings());
        }

        window.navigateToFeedExternal = () => navigateToFeed();
        window.navigateToProfileExternal = (id) => navigateToProfile(id);
        window.deletePostExternal = (id) => { deletePost(id); render(); };
        window.addCommentExternal = (postId, text) => { addComment(postId, text); render(); };
        window.toggleCommentsExternal = (postId) => { const el = document.getElementById(`comments-${postId}`); if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none'; };
        window.sendFriendExternal = (id) => sendFriendRequest(id);
        window.acceptFriendExternal = (id) => acceptFriendRequest(id);
        window.approveVerificationExternal = (id) => approveVerification(id);
        window.rejectVerificationExternal = (id) => rejectVerification(id);
        window.banUserExternal = (id) => openBanModal(id);

        document.addEventListener('click', (e) => {
            const likeBtn = e.target.closest('.like-btn');
            if (likeBtn) { const postId = likeBtn.dataset.post; if (postId) toggleLike(postId); }
        });

        loadData();
        initDemoData();
        render();
    </script>
</body>
</html>
